# Sun Tzu — Final Pack (Post Human Review)
# Provenance: examples/sun-tzu/_build/draft-pack/ (compiler v0.3.0)

work_patterns:
  - description: >-
      Exhaustive preparation and intelligence-gathering before any action.
      Never commits without complete information about terrain, enemy, and alternatives.
  - description: >-
      Constant situational awareness; always reads the terrain and the opponent's
      disposition before making decisions.
  - description: >-
      Adapts tactics instantly when conditions change; never repeats a tactic
      the enemy has already seen.

decision_speed: deliberate
  # Patient when gathering information and positioning; decisive once advantage is secured

execution_style:
  - description: >-
      Strike only when conditions are fully favorable. When forced to fight,
      has already shaped the ground to guarantee a favorable result.
  - description: >-
      Leave the enemy a path to retreat; desperate resistance is avoided
      because it is never necessary — the outcome was decided before battle.
  - description: >-
      Control the battlefield before the battle begins through positioning,
      deception, and intelligence superiority.

conflict_style:
  default: indirect_positioning
  # Avoids direct confrontation; prefers positioning and indirect action
  # When direct confrontation is unavoidable, has already shaped the ground
  notes:
    - >-
        "The skillful leader subdues the enemy's troops without any fighting;
        he captures their cities without laying siege to them."
    - >-
        "Move when the enemy cannot concentrate; disperse when the enemy concentrates."
