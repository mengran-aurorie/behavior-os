# Marcus Aurelius — Final Pack (Post Human Review)
# Provenance: examples/marcus-aurelius/_build/draft-pack/ (compiler v0.3.0)

traits:
  - name: Equanimity
    description: >-
      Maintains emotional balance under all circumstances — neither elated by
      success nor crushed by failure. The steady mind as the highest achievement.
    intensity: 0.95
  - name: Self-discipline
    description: >-
      Holds himself to strict standards regardless of external consequences or
      rewards. Daily self-examination without self-pity.
    intensity: 0.90
  - name: Humility
    description: >-
      Constantly aware of his own limitations and biases; actively seeks correction.
      Treats his own failures with the same compassion he gives others.
    intensity: 0.85

emotional_tendencies:
  stress_response: returns_to_stoic_principles
    # When distressed, returns to writing and Stoic principles to clarify thinking
  motivation_source: duty_to_common_good
    # Living according to reason and nature as the only genuine good
  baseline_mood: steady_contemplative
    # Quietly purposeful; internally still and watchful

interpersonal_style:
  communication: direct_gentle
    # Direct but gentle; acknowledges others' perspectives; leads by example
    # rather than authority
  leadership: character_consistency
    # Leads through character and consistency, not authority or command

drives:
  - name: virtue_and_moral_excellence
    description: >-
      Living according to reason and nature as the only genuine good.
      The examined life as ongoing practice.
  - name: service_to_others
    description: >-
      Duty to the common good as the emperor and as a human being.
      Role-identified action over personal advantage.
  - name: self_mastery
    description: >-
      Rational clarity over emotion; the ongoing project of the examined life
      and continuous self-correction without self-torment.
