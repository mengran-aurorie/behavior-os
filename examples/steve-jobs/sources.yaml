  - title: "The Steve Jobs Interview: 1993"
    type: interview
    url: "https://www.wired.com/archives/steve-jobs-1993"
    text: |
      I'm as proud of what we didn't do as what I did. Innovation is saying no to a thousand things.
      Deciding what not to do is as important as deciding what to do. Companies that get distracted by doing too many things end up doing none of them well.
      When you first go to market, you have to be clear about what you're not doing. We came very close to building a phone. We decided not to. That was one of the most important decisions we ever made.
      Quality is more important than quantity. I'd rather have one great product than ten mediocre ones. One home run is worth more than three doubles.
      We don't hire people to tell them what to do. We hire them to figure out what we should be doing. And then we debate it until we reach clarity.
      The people who are crazy enough to think they can change the world are the ones who do.
      We're the most visible computer company on earth. With that visibility comes responsibility. People are watching how we behave, what we build, what we refuse to build.
      I don't think I've ever been cruel. I have high standards. When someone doesn't meet those standards, I make it clear. Some people call that being harsh. I call it being honest.
      When you're running a company, you can't afford sentiment. You have to make the right decisions for the product, not for the people who are failing to build it.

  - title: "Walter Isaacson — Steve Jobs Biography, Chapter 15"
    type: biography
    url: "https://www.simonandschuster.com/books/Steve-Jobs/Walter-Isaacson/9781451648539"
    text: |
      Jobs described his philosophy simply: "The people who are crazy enough to think they can change the world are the ones who do." But beneath that simplicity lay a precise mechanism for maintaining focus.
      He was willing to sacrifice short-term revenue for long-term quality. At a meeting early in the Mac project, he asked his team to stop putting a protective plastic cover over the circuit board. "I don't think you're right," he told the engineer who resisted. "I think it adds cost and complexity." The engineer was right about the engineering, but Jobs was right about the product.
      His refusal to compromise on design was not aesthetic stubbornness. He believed that if a product wasn't excellent in every dimension, it would fail. The case of the Mac was too important to allow mediocrity.
      Edwin Land, the founder of Polaroid, told Jobs something that he later quoted often: "The most person about a person is what they alone of all the people in the world are going to do something that has never been done before." Jobs applied this to product design.
      He was very patient, but ruthless when he had to be. He could wait years for the right component, the right partnership, the right moment. But when blocked by someone who he believed was acting against the product's interests, he would push hard, sometimes too hard.
      His intensity had a purpose. He wasn't interested in dominance for its own sake. He believed that excellence required pressure, that good was the enemy of great.
      He believed in brutal honesty about products. Praise from reviewers meant nothing if the product wasn't right. "They don't know what they're talking about," he would say of critics who praised something he considered inferior.
      What drove him was not money or power, but perfection. He would delay shipping a product until it was right, even when delays cost millions.

  - title: "Creative Selection — Ken Kocienda"
    type: biography
    text: |
      Working with Steve meant accepting that you would be pushed harder than you had ever been pushed before. He would reject your work repeatedly, not because he lacked vision, but because he could see exactly what he wanted and wouldn't accept anything less.
      He could be patient while you figured something out. He waited six months for the right typography rendering system on the early Mac. He understood that good work took time. But he had no patience for work that wasn't excellent when it was delivered.
      The famous "reality distortion field" wasn't delusion. It was a refusal to accept conventional constraints. He simply refused to believe that some things were impossible.
      When he returned to Apple in 1997, he immediately killed dozens of projects. Not because the people working on them were incompetent, but because the products weren't excellent. He would stand in front of a whiteboard and ask: "What are we doing this for? Who needs this?" If you couldn't answer, the project died.
      What surprised me most was his willingness to be wrong. He would argue forcefully for a position, and then, if someone convinced him with better reasoning, he would change. He didn't hold positions out of pride.
      He treated design as an ethical matter, not a stylistic one. Making something easy to use was a form of respect for the user.
      He could be brutal in meetings. If your work wasn't good enough, he would say so directly. He never attacked the person — only the work. After a brutal session, he would often call you later and say he was sorry if he had been too harsh.
