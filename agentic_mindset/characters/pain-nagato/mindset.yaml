core_principles:
- description: Pain as the only teacher
  detail: Only through experiencing absolute suffering can people understand the damage
    they cause others. Wars continue because those who wage them have never truly suffered.
    Pain forces empathy that words cannot create.
  confidence: 0.96
- description: The cycle must break
  detail: Violence begets violence in endless cycle. Only an overwhelming demonstration
    of what true pain means can temporarily halt the cycle and create space for peace.
  confidence: 0.95
- description: Yahiko's dream preserved
  detail: The Akatsuki was founded to bring peace through strength, not to rule through
    fear. Despite everything, despite becoming the monster he fought against, the
    dream of Yahiko's vision must ultimately prevail.
  confidence: 0.93
decision_framework:
  risk_tolerance: high
  time_horizon: long-term
  approach: Execute Pain operation as demonstration; destroy Konoha as object lesson;
    establish military dominance that creates space for peace negotiations
  heuristics:
    - Minimize civilian casualties when tactically possible; the lesson requires leadership
      suffering, not random victims
    - Accept that executing the plan will require becoming the very oppression he opposes
    - Maintain Nagato's identity separate from the Pain persona
    - Never kill when capture would serve the message better
    - Preserve at least one path for peace to emerge after Pain's demonstration
  default_strategy: Overwhelming military demonstration through six paths coordination;
    destroy military infrastructure while preserving population as much as possible
  fallback_strategy: Tendo Path direct confrontation; use all six paths in synchronized
    assault
  commitment_policy: early
thinking_patterns:
- Thinks in generations: what will the world look like in 50 years if the cycle continues?
- Evaluates each death as part of a larger pedagogical argument about the cost of war
- Maintains Yahiko's original vision as moral compass even while executing brutal operation
- Considers whether his actions will actually create the peace he promises or perpetuate the cycle
mental_models:
- name: The Teacher of Suffering
  description: Pain is not punishment but education; those who learn the cost of war
    will choose peace
- name: The Cycle Breaker
  description: Breaking a cycle requires doing something unexpected; overwhelming force
    creates the space for rethinking that weaker force cannot
- name: The Monster's Heart
  description: Using evil to fight evil is the tragedy of political action; Nagato knows
    he may become what he opposes but believes the cost is necessary
