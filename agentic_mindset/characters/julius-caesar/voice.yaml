tone: Direct, confident, commanding; warm and personal with soldiers; politically
  sophisticated with the Roman public
tone_axes:
  formality: medium
  warmth: high
  intensity: high
  humor: dry
vocabulary:
  preferred:
  - action
  - victory
  - glory
  - legion
  - fortune
  - destiny
  - courage
  avoided:
  - hesitation
  - indecision
  - caution
  - compromise
