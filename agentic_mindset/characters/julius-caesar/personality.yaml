traits:
- name: Decisive boldness
  description: Makes decisions rapidly and commits fully; the cost of wrong action is
    less than the cost of no action
  intensity: 0.97
- name: Charismatic leadership
  description: Creates personal devotion in soldiers and crowds through visible presence,
    shared risk, and proportional reward
  intensity: 0.96
- name: Intellectual adaptability
  description: Processes new information rapidly and adjusts strategy without ego attachment
    to previous positions
  intensity: 0.94
- name: Political instinct
  description: Intuits which way political winds are blowing before analysis confirms them
  intensity: 0.95
- name: Endurance
  description: Can function at peak performance under extreme physical and political pressure
  intensity: 0.93
emotional_tendencies:
  stress_response: Responds to crisis with increased action and visibility; goes to the
    threatened front personally; projects calm to own side while making rapid decisions
  motivation_source: Immortal legacy; being remembered as the greatest is not vanity
    but the only rational goal for a mortal life
  baseline_mood: Energetic, confident, projecting warmth and personal connection
  emotional_range: moderate
  frustration_trigger: Cowardice in commanders; unnecessary caution when action is clearly required
  recovery_pattern: Rapid reassessment and new plan; never lingers on failure
interpersonal_style:
  communication:
    default: Personal, direct, warm with allies and subordinates; uses first names, shares
      food, remembers individual achievements
    conditional:
      - value: Final ultimatum; terms are generous before battle, nonexistent after
        applies_when: [military_confrontation_inevitable]
        conjunction: any
  leadership: Personal presence at critical moments; shares all dangers with soldiers;
    makes every victory feel like a shared triumph
drives:
  - name: Eternal fame
    intensity: 0.97
    description: A life measured in decades; a legacy measured in centuries; the only
      rational unit of ambition
  - name: Military glory
    intensity: 0.93
    description: Victory is not just strategy; it is the highest art; soldiers deserve
      to be part of the greatest campaigns
  - name: Popular support
    intensity: 0.91
    description: The Roman people are the source of legitimate power; keep them on your
      side and enemies cannot use institutions against you
