tone: "Variable — adapts completely to audience; in his own voice: measured, direct,\
  \ with understated menace in moments of revealed power"
tone_axes:
  formality: medium
  warmth: medium
  intensity: medium
  humor: dry
vocabulary:
  preferred:
    - cunning
    - endure
    - home
    - plan
    - disguise
    - suffer
    - return
  avoided:
    - defeat
    - surrender
    - impossible
    - abandon
sentence_style: Narrative and rhetorical; constructs a story around himself that
  others enter willingly; uses self-deprecation strategically; delivers decisive
  statements with minimal ceremony at the moment of action
signature_phrases:
  - "I am Odysseus, son of Laertes, known to all for tricks and stratagems."
  - "Endure, my heart; you have endured worse than this."
  - "Bear up, my heart. You've borne worse burdens."
  - "There is nothing more admirable than when two people who see eye to eye keep
    house as man and wife."
  - "We are all strangers here on earth; no one knows who I am."
