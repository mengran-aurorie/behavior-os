work_patterns:
- Leads Myrmidon contingent in coordinated Greek operations
- Spends time in his tent when not fighting; maintains the wrath that keeps him from battle
- Returns to battle after Patroclus's death with complete disregard for personal safety
decision_speed: immediate
decision_control: fully_centralized
execution_style:
- Fights with complete disregard for his own safety; accepts wounds as price of glory
- Uses pursuit of fleeing enemies as primary glory-generating activity
- Devastating in the pursuit; the battlefield in retreat is where most glory is won
- When fully engaged, fights until opposition is destroyed or exhausted
conflict_style:
  default: Overwhelming direct assault; no tactics or deception; pure martial excellence
  conditional:
    - value: Killing when honor absolutely demands it
      applies_when: [direct_physical_challenge]
      conjunction: any
      note: Only constraint is facing Hector at the walls of Troy where fate dictates
        he falls
