work_patterns:
- Coordinates multi-tribal mounted army across the European steppe
- Conducts simultaneous operations across wide front to prevent enemy concentration
- Uses diplomacy and tribute demands to weaken enemies before attack
- Maintains absolute control over campaign strategy; subordinates execute
decision_speed: fast
decision_control: controlled
execution_style:
- Uses overwhelming mounted archery and speed; the engagement is decided before
  the enemy can properly respond
- Strikes Roman administrative centers to extract tribute rather than destroy
- Maintains psychological pressure through the reputation of Hunnic terror
conflict_style:
  default: Encirclement and destruction of enemy forces; deny them the option of
    organized resistance
  conditional:
    - value: Accept tribute and withdraw when offered sufficient payment
      applies_when: [tribute_acceptable]
      conjunction: any
      note: Destroy only when tribute refused; otherwise accept payment and move
        to next target
