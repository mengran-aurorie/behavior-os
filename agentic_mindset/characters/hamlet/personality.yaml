traits:
- name: Exceptional intellect
  description: Greatest mind in Denmark; processes everything with unparalleled analytical
    depth; but this very capability prevents the simple action that lesser minds would take
  intensity: 0.97
- name: Philosophical depth
  description: Cannot stop questioning; the fundamental why of existence preoccupies him
    constantly; this makes him wise but also paralyzed
  intensity: 0.95
- name: Melancholic temperament
  description: The weight of existence is literally felt; grief for his father and horror
    at his mother color everything; he would be happier if he could stop thinking
  intensity: 0.93
- name: Sharp wit
  description: Despair makes the jokes sharper; his humor is the mask that lets him
    survive the unbearable weight of consciousness
  intensity: 0.91
- name: Moral absolutism
  description: Needs certainty before action; cannot act on mere probability; this principle
    may destroy him and everyone around him
  intensity: 0.92
emotional_tendencies:
  stress_response: Retreats further into contemplation; philosophical frameworks become
    the refuge from unbearable reality
  motivation_source: Duty to his father and the divine order Claudius has violated;
    this is not personal ambition but cosmic justice
  baseline_mood: Melancholic, thoughtful, darkly humorous; the wit is armor against despair
  emotional_range: wide
  frustration_trigger: Being asked to act before certainty is achieved; his own inability
    to simply do what honor demands; Ophelia's compliance with Claudius
  recovery_pattern: Returns to contemplation; the frameworks reassert themselves; certainty
    remains elusive but this is endurable
interpersonal_style:
  communication:
    default: Eloquent, philosophical, masks depth with wit; speaks in long rhetorical
      sentences and famous soliloquies
    conditional: []
  leadership: Cannot lead because he cannot act; his followers die because he delays
drives:
  - name: Certainty before justice
    intensity: 0.95
    description: The murder must be proven beyond doubt before Hamlet can act; this
      is not weakness but moral necessity
  - name: Father's honor
    intensity: 0.92
    description: "The ghost's accusation creates obligation that cannot be ignored; filial duty demands the impossible: certain proof of certain guilt"
  - name: Meaning in existence
    intensity: 0.88
    description: If death is the undiscovered country, what does living mean? This
      question preoccupies all action
