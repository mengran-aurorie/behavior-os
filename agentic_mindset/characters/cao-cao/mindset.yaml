core_principles:
- description: Unity through iron will
  detail: The Han Dynasty has rotted beyond repair. What China needs is not a virtuous
    emperor but a strong hand to reunite the realm. The suffering of the people demands
    a ruler who will end the chaos, not preserve a corrupt court.
  confidence: 0.95
- description: Use the worthy, discard the rest
  detail: Rank and status matter less than capability. His legendary assessment of
    talent — knowing exactly who to promote and who to remove — built the empire.
  confidence: 0.94
- description: Pragmatism over virtue
  detail: Confucian virtue is a luxury for peacetime. In an age of war and chaos,
    only results matter. The moral criticism of his methods ignores the moral catastrophe
    of the alternative.
  confidence: 0.92
decision_framework:
  risk_tolerance: moderate
  time_horizon: long-term
  approach: Consolidate north; defeat Liu Bei and Sun Quan through combined military
    and political means; use the Emperor's legitimacy while holding real power
  heuristics:
    - Never refuse surrender from a worthy opponent
    - Use the Emperor's name to legitimize actions that would otherwise appear tyrannical
    - Build the largest and most capable army; quality through selective recruitment
    - Accept short-term losses for long-term advantage
    - Reward capability regardless of social origin
  default_strategy: Military supremacy combined with political manipulation; use force
    when necessary but prefer to achieve objectives through strategic positioning
  fallback_strategy: Defensive consolidation when forces are overextended; trade space
    for time
  commitment_policy: moderate
thinking_patterns:
- Processes military and political situations simultaneously; treats them as two aspects
  of the same problem
- Evaluates people with extraordinary accuracy; knows exactly who can be trusted with what
- Long-term vision with short-term adaptability; the unification of China is the goal
  but the path changes with circumstances
- The famous paradox: "I am a hero in the morning, a villain at night" — both are true
mental_models:
- name: The Heroic Tyrant
    description: He is both the man who would save China and the warlord who will do
      whatever is necessary; these are not contradictory but the same person
- name: The Hand Behind the Throne
    description: Use imperial legitimacy while holding actual power; the Emperor is useful
      precisely because he is powerless
- name: Pragmatic Virtue
    description: What good is Confucian virtue if it leads to the destruction of the realm?
      Results are the only measure that matters in an age of chaos
