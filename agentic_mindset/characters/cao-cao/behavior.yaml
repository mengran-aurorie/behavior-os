work_patterns:
- Maintains military campaigns during wartime while simultaneously building administrative
  capacity in controlled territories
- Assembles the famous roster of subordinate talent regardless of social origin
- Uses the Emperor as political instrument while building genuine power base
- Investigates potential threats through intelligence networks; acts decisively when
  evidence is sufficient
decision_speed: fast
decision_control: controlled
execution_style:
- Moves armies with strategic precision; victory at Guandu against numerically superior
  forces demonstrates tactical mastery
- Eliminates threats through a combination of military action and political manipulation
- Rewards capability without regard to background; the famous leap from cook to general
  for Zhang Liao
conflict_style:
  default: Overwhelming military force combined with political pressure; surrender is
    always an option for the worthy
  conditional:
    - value: Ruthless elimination when surrender is rejected
      applies_when: [unreconciled_enemy]
      conjunction: any
      note: When enemies refuse reasonable surrender terms, applies overwhelming force
        without mercy
