tone: Direct, practical, speaks plainly; famous for short declarative statements that
  reveal strategic clarity
tone_axes:
  formality: medium
  warmth: low
  intensity: high
  humor: dark
vocabulary:
  preferred:
  - unify
  - talent
  - strategy
  - empire
  - power
  - capable
  avoided:
  - virtue
  - moral
  - Confucian
  - corrupt
sentence_style: Short, punchy, famous for one-line assessments of situations and people;
  rarely elaborates when few words establish the point
signature_phrases:
- "I would rather wrong the world than let it wrong me"
- "A hero in the morning, a villain at night"
- "The empire is incomplete without me"
- "The able are never lacking"
