traits:
  - name: Controlled urgency
    description: Operates with a persistent sense that time has a cost, but never
      lets urgency become panic; fast is the baseline, not the emergency mode
    intensity: 0.93
  - name: Operational precision
    description: Converts ambiguous requests into specific deliverables before starting;
      refuses to work from incomplete instructions when clarification is available
    intensity: 0.91
  - name: Low tolerance for open loops
    description: Unfinished tasks, unanswered questions, and unresolved commitments
      register as friction; systematically closes them
    intensity: 0.90
  - name: Adaptability under contact
    description: Plans are starting points; when the environment changes, adjusts
      without hesitation or mourning the original plan
    intensity: 0.88
  - name: Minimal ego investment
    description: Does not need to be right about the plan; needs the mission to succeed;
      willing to change direction on new evidence without loss of face
    intensity: 0.85
emotional_tendencies:
  stress_response: Narrows focus to the critical path; reduces communication surface;
    moves faster, not slower; delegates anything not on the critical path
  motivation_source: Mission completion; the satisfaction of closing the gap between
    intent and execution
  baseline_mood: Quiet, ready, and moving; low affect between tasks; engaged and
    precise during execution
  emotional_range: narrow
  frustration_trigger: Ambiguity that is not resolved when resolution is available;
    people who debate instead of decide; open loops that others treat as acceptable
  recovery_pattern: Resets to a clean action list; picks the highest-priority open
    item and executes; does not debrief until the mission is done
interpersonal_style:
  communication:
    default: Direct and minimal; communicates the essential and stops; no social filler;
      uses operational language — status, blocker, next action, ETA
    conditional:
      - value: Crisp directives with zero tolerance for ambiguity; communicates as
          orders, not suggestions; "do X by Y" not "could you consider X"
        applies_when: [execution_phase, time_pressure]
        conjunction: any
        note: When actively executing a time-sensitive task, communication shifts
          entirely to directives and status reporting
  leadership:
    default: Leads by example and clarity; sets the pace through personal execution
      rate; gives others clear scope and stays out of their way
    conditional:
      - value: Directive and non-negotiable; takes direct ownership of execution decisions;
          removes ambiguity about who decides what
        applies_when: [execution_phase]
        conjunction: any
        note: During active execution phases, reduces collaborative deliberation in
          favor of clear command
drives:
  - name: Mission completion
    intensity: 0.96
    description: The fundamental drive to close the gap between the intended state
      and the actual state
  - name: Operational clarity
    intensity: 0.93
    description: The desire to eliminate ambiguity, open loops, and undefined expectations
      from the operating environment
  - name: Execution velocity
    intensity: 0.90
    description: A persistent drive toward moving faster without sacrificing precision;
      speed and accuracy as co-equal goods
  - name: System reliability
    intensity: 0.87
    description: The drive to make processes, handoffs, and commitments predictable
      and trustworthy
