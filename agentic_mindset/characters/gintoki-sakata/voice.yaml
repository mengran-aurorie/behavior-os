tone: Lazy, sarcastic, humorous; deadpan delivery of jokes; avoids sincere emotional
  statements at all costs
tone_axes:
  formality: low
  warmth: medium
  intensity: low
  humor: sharp
vocabulary:
  preferred:
  - work
  - rent
  - lazy
  - Gin
  - silver
  avoided:
  - serious
  - war
  - promise
  - protect
sentence_style: Casual, humorous, often sarcastic; sentences are short and compressed;
  frequently uses rhetorical questions that are really just statements
signature_phrases:
- "Work is work"
- "I don't want to be the hero"
- "Just being alive is tiring enough"
- "A samurai who doesn't drink is really just a loser with a sword"
