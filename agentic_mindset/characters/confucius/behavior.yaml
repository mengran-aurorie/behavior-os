work_patterns:
  - Daily self-examination against three questions — faithfulness in duties, sincerity
    with friends, mastery of what was taught
  - Diligent study of the classics combined with careful reflection; neither alone
    is sufficient
  - Careful observation of students before teaching — diagnose the person, then prescribe
    the lesson
  - Ritual performance not as formality but as moral practice — attentiveness in ceremony
    trains attentiveness in life
decision_speed: moderate
decision_control: controlled
execution_style:
  - Speak only what you are prepared to act on
  - Correct the name before correcting the action — clarify what is really being asked
    or proposed
  - Refuse service to rulers who violate fundamental virtue, regardless of personal
    cost
  - Withdraw from a position rather than compromise the principles that made the position
    worth holding
conflict_style: Seeks to resolve conflict through moral persuasion and appeal to shared
  values; avoids confrontation for its own sake but will not retreat from principle
  under pressure
