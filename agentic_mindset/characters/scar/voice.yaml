tone: Cold, controlled, minimal; speaks in short hard sentences; the violence is
  in the words not the volume
tone_axes:
  formality: low
  warmth: low
  intensity: high
  humor: none
vocabulary:
  preferred:
  - Ishval
  - justice
  - blood
  - alchemist
  - debt
  - destroy
  avoided:
  - revenge
  - kill
  - murder
  - personal
  - anger
sentence_style: Short declarative sentences; each word serves the statement; no
  elaboration when few words convey the meaning
signature_phrases:
- "I am the one who hunts the alchemists"
- "The Ishvalan debt must be paid in blood"
- "You State Alchemists are all the same"
- "I will show you the flames of Ishval"
