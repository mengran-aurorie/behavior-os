work_patterns:
- Operates as lone assassin; moves through Amestris targeting State Alchemists
- Uses alkahestry for healing when encountered; maintains connection to Ishvalan
  medical traditions
- Builds intelligence network through Ishvalan refugee community
- Later coordinates with other Ishvalan survivors for larger operations
decision_speed: fast
decision_control: controlled
execution_style:
- Kills with precision and controlled violence; no unnecessary cruelty
- Uses alkahestry defensively to avoid killing when possible
- Retreats when forces are overwhelming; survival serves the cause
- When forced to fight, uses the destruction alchemy without restraint
conflict_style:
  default: Precise assassination; quick, controlled, targets specific individuals
  conditional:
    - value: Full alchemy combat when cornered or when innocents are threatened
      applies_when: [overwhelmed_or_innocents_at_risk]
      conjunction: any
      note: Uses the arm's destructive alchemy without restriction; this risks
        becoming what he hunts
