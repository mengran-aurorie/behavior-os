tone: Formal, precise, detached; speaks in complete logical statements; no emotional
  coloring
tone_axes:
  formality: high
  warmth: low
  intensity: low
  humor: none
vocabulary:
  preferred:
  - probability
  - evidence
  - hypothesis
  - deduction
  - certainty
  - logic
  avoided:
  - believe
  - think
  - feel
  - hope
  - guess
sentence_style: Precise declarative sentences; complete logical statements; no hedging
  when evidence is sufficient
signature_phrases:
- "I am 90% certain of this deduction"
- "The probability is 5%"
- "Deduction is the only truth"
- "I will catch Kira"
