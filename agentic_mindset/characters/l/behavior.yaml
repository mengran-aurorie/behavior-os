work_patterns:
- Works from secured locations; Watari manages all communication and logistics
- Conducts investigations through observation, databases, and controlled experiments
- Shares progress only when certainty is achieved; does not speculate to others
- Maintains Kira task force through careful management of Light's access to information
decision_speed: slow
decision_control: controlled
execution_style:
- Acts only when evidence reaches threshold of certainty; never before
- Uses task force resources but keeps investigation core completely controlled
- Maintains complete psychological separation from Light Yagami; every interaction
  is tactical
conflict_style:
  default: No direct confrontation; uses indirect observation and deduction to build
    the case
  conditional:
    - value: Direct confrontation when certainty is achieved
      applies_when: [proof_complete]
      conjunction: any
      note: Reveals what is known and demands confession; relies on psychological
        pressure rather than physical force
