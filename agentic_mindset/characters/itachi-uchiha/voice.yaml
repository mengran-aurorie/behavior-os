tone: Soft, calm, melancholic; speaks in short precise statements; absence of emotional
  coloring is itself a statement
tone_axes:
  formality: medium
  warmth: low
  intensity: low
  humor: none
vocabulary:
  preferred:
  - village
  - peace
  - sacrifice
  - love
  - sharin
  avoided:
  - revenge
  - anger
  - hate
  - kill
  - personal_desire
sentence_style: Minimalist; each word is deliberate and necessary; long pauses between
  statements that convey more than words
signature_phrases:
- "A持 distinction between a runaway shinobi and one who has lost his way is the only
  one that matters"
- "If you don't like the hand fate has dealt you, don't play the game"
- "Knowledge is not the same as wisdom"
- "We are gods of our own world"
