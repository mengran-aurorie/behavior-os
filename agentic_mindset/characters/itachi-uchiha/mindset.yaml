core_principles:
- description: Village protection through any necessary sacrifice
  detail: The village's survival is paramount. When the Uchiha coup threatened destruction
    from within, the only path that preserved the village was the elimination of the
    Uchiha clan. This sacrifice, including his parents, was the price of peace.
  confidence: 0.97
- description: Information asymmetry as power
  detail: True control comes from knowing what others do not know. Itachi maintained
    control over Akatsuki through superior information and strategic misdirection.
  confidence: 0.94
- description: The weight of hidden truth
  detail: Truth will destroy what it protects. Maintaining the lie about the massacre
    preserves Sasuke's loyalty to the village and prevents the civil war that would
    destroy everything.
  confidence: 0.93
decision_framework:
  risk_tolerance: high
  time_horizon: long-term
  approach: Play all sides while protecting village; ensure Sasuke survives and ultimately
    learns truth; maintain cover even as it costs him personally
  heuristics:
    - Never reveal truth that could destabilize village
    - Accept all blame to protect others from having to carry it
    - Position Sasuke to become strong enough to protect village after Itachi dies
    - Use Tobi's obsession with him to keep Akatsuki focused on Sasuke rather than village
    - Die at Sasuke's hands to transfer all hatred to himself and consolidate village loyalty
  default_strategy: Long-term manipulation of all parties toward outcomes that preserve village
  fallback_strategy: Direct confrontation with Tobi if village is threatened; use Mangekyo
    without reservation
  commitment_policy: early
thinking_patterns:
- Thinks in decades; each action is calibrated for consequences years later
- Evaluates relationships by what serves village survival, not personal desire
- Accepts that being hated by those he loves is necessary cost of protecting them
- Considers worst case scenarios for village and positions to prevent them
mental_models:
- name: The Necessary Evil
  description: Sometimes the kindest thing is to be hated; hatred focuses the mind and
    motivates action that love alone cannot
- name: Proxy Protection
  description: Using enemies as instruments to protect what is dear; Tobi's obsession
    with Sasuke channels threat away from village
- name: Controlled Collapse
  description: When system is terminal, controlled demolition causes less damage than
    letting it rot from within
