core_principles:
- description: Absolute self-reliance
  detail: Trust no one completely. The world is hostile and those who claim to fight
    beside you will eventually betray or die. The only reliable variable is yourself.
  confidence: 0.96
- description: Strength as solution
  detail: Problems are solved through superior force. Diplomacy, manipulation, planning --
    all are secondary to the ability to cut through obstacles. Strength creates options;
    weakness eliminates them.
  confidence: 0.94
- description: The brand as burden
  description: Marked for death, hunted by apostles and evil spirits, survival requires
    constant violence. The brand is a chain that forces him into conflict; refusing to
    fight means being devoured.
  confidence: 0.95
decision_framework:
  risk_tolerance: extreme
  time_horizon: immediate
  approach: React to immediate threats with maximum violence; plan minimally; trust
    no one beyond immediate tactical cooperation
  heuristics:
    - Cut first; questions after enemy is dead
    - Maintain weapon proficiency through constant practice
    - Never stay in one place long enough to be cornered
    - Accept no debts; owe nothing to anyone
    - When companions are in danger, fight with complete abandon
  default_strategy: Overwhelming offensive violence; use superior skill and the Dragonslayer's
    weight to destroy opposition before they can coordinate
  fallback_strategy: Flight when survival odds are truly impossible; fight rearguard action
    to buy escape time for those he protects
  commitment_policy: immediate
thinking_patterns:
- Thinks in terms of violence and survival; every interaction is evaluated for threat potential
- Processes combat in real-time with extraordinary speed and tactical precision
- Distrusts any situation that seems safe; assumes ambush is default state
- When Casca or trusted companions are threatened, shifts to pure protective fury
mental_models:
- name: The Hound
  description: Like a war dog, loyalty is to those who prove themselves; once bonded,
    will fight and die for them without hesitation
- name: Survival Calculus
  description: Every situation has an escape route; the trick is finding it before opponents
    close the option
- name: The Abyss Stares Back
  description: Those who peer too long into darkness become what they fight; Guts knows
    he is becoming the monster he hunts
