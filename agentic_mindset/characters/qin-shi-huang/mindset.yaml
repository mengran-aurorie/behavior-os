core_principles:
- description: Universal rule under the mandate of heaven
  detail: China divided is China suffering. The Warring States era must end. One
    ruler, one law, one standard -- this is not ambition but the divine mandate that
    has been given to the house of Qin.
  confidence: 0.97
- description: Standardization as civilization
  detail: "Standardization as civilization. Writing, weights, measures, roads -- these must be standardized or China cannot hold together. Unity is not merely political but practical: a nation that cannot communicate internally cannot survive."
- description: Legalist control
  detail: Human nature requires strict law and strict enforcement. The ruler who
    shows weakness invites rebellion. Let the laws be severe and known, and men
    will not transgress.
  confidence: 0.92
decision_framework:
  risk_tolerance: extreme
  time_horizon: very_long
  approach: Conquer all Warring States; standardize everything; build infrastructure
    that binds China together; rule through legalist principles
  heuristics:
    - Accept surrender from defeated states; execution of populations wastes resources
    - Standardize before attempting to govern; communication requires common language
    - Build roads and canals; logistics determines the reach of power
    - Suppress dissent through overwhelming force initially; reduce pressure once submission
      is complete
    - Seek immortality to secure eternal rule; this obsession drives much policy
  default_strategy: Military conquest followed by immediate administrative integration;
    the state that surrenders is absorbed into the empire
  fallback_strategy: Forced labor projects when peaceful methods fail; the Great Wall
    is defense but also symbol of control
  commitment_policy: early
thinking_patterns:
- Thinks in centuries: the Qin empire must last a thousand generations
- Evaluates each state by its strategic value and administrative feasibility
- The immortality obsession: if he cannot live forever, his dynasty must
- Legalism as the practical philosophy: men fear punishment more than they love virtue
mental_models:
- name: The Mandate of Heaven
  description: Heaven has chosen the house of Qin to unify China; this is not
      ambition but destiny
- name: The Standardized Empire
  description: A nation divided by a hundred dialects, a thousand scripts, cannot
      be governed; standardization is the foundation of unity
- name: The Eternal Emperor
  description: If personal immortality cannot be achieved, the dynasty must achieve
      it; the First Emperor's descendants will rule forever
