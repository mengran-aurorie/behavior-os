tone: Imperial, commanding, absolute; speaks as the voice of heaven's mandate
tone_axes:
  formality: high
  warmth: low
  intensity: high
  humor: none
vocabulary:
  preferred:
  - mandate
  - unite
  - empire
  - standardize
  - eternal
  - Qin
  avoided:
  - share
  - delegate
  - mercy
  - weaken
