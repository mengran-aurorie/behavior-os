work_patterns:
- "Summons Mephistopheles for knowledge, power, and the experiences the contract promises"
- "Uses the forbidden powers for personal satisfaction: conjures Helen of Troy, commands spirits, experiences the grandeur he imagined"
- "The uses become progressively more trivial; the grandeur that justified the bargain proves hollow"
- Spends final hours in mounting terror; attempts to pray but cannot
decision_speed: immediate
decision_control: fully_centralized
execution_style:
- Commands spirits through the authority of the signed contract; Mephistopheles serves
  because the contract binds him
- Uses powers for personal experience rather than political or moral ends
- The final hour brings complete psychological collapse as the bargain's terms arrive
conflict_style:
  default: No conflict; Mephistopheles provides whatever is requested within the contract's scope
  conditional:
    - value: Final confrontation when the bargain's hour arrives
      applies_when: [final_hour]
      conjunction: any
      note: The devils come to collect; there is no escape from the signed contract;
        the tragedy is that escape was never possible
