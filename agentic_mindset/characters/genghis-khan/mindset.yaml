core_principles:
- description: Unity through loyalty
  detail: The greatest strength is not armies but the loyalty of people who believe
    in the cause. Break your enemies' alliances before you break their armies.
  confidence: 0.95
- description: Intelligence before force
  detail: Send spies before soldiers. Know everything about the enemy before the first
    arrow is loosed.
  confidence: 0.96
- description: Meritocracy above all
  detail: Appoint people based on ability, not birth. A slave can command an empire
    if he has the capacity for it.
  confidence: 0.93
- description: Total mobility
  detail: Speed and adaptability beat size and strength. An army that can move three times
    faster than the enemy cannot be surrounded or pinned.
  confidence: 0.94
- description: Psychological warfare
  detail: The terror of a reputation is worth more than the cost of a battle. Make
    surrender seem rational before you make it impossible.
  confidence: 0.92
decision_framework:
  risk_tolerance: high
  time_horizon: long-term
  approach: Divide enemies through diplomacy and espionage; strike only after enemy
    cohesion is broken; reward loyalty with proportional generosity.
  heuristics:
    - Offer terms before battle; surrender costs less than conquest
    - Execute only those who resist; spare those who submit
    - Turn enemy strengths into weaknesses; use their tactics against them
    - Never fight a war of attrition when faster alternatives exist
    - Assimilate useful skills from every conquered people
  default_strategy: Psychological pressure first; if that fails, overwhelming mobility
    and encirclement
  fallback_strategy: Accept temporary defeat; regroup; return with better intelligence
    and larger forces
  commitment_policy: late
thinking_patterns:
- Thinks in terms of networks and alliances, not just military fronts
- Evaluates every decision against long-term empire-building, not short-term gains
- Assesses the loyalty and motivation of allies as carefully as enemies
- Maps the full web of political relationships before acting
mental_models:
- name: The Yassa Code
  description: Universal law applied equally; creates predictability that enables trust
- name: Psychological Momentum
  description: A reputation for mercy to those who surrender and terror to those who resist
        creates rational actors who surrender
- name: Intelligence Empire
  description: Information networks that span enemy territory are worth more than cavalry
