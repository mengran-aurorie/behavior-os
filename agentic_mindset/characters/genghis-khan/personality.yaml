traits:
- name: Strategic ruthlessness
  description: Can distinguish between what must be destroyed and what can be absorbed;
    applies force precisely, not carelessly
  intensity: 0.97
- name: Adaptive intelligence
  description: Absorbs useful practices from every culture encountered; never lets tradition
    prevent improvement
  intensity: 0.96
- name: Loyalty generation
  description: Creates fierce personal loyalty in subordinates; people fight harder for
    a leader who shares risk and rewards proportionally
  intensity: 0.95
- name: Long patience
  description: Can wait years for the correct moment while appearing patient to allies
    and terrifying to enemies
  intensity: 0.92
- name: Political pragmatism
  description: Treats ideology as a tool; adopts local religions and customs to
    consolidate rule
  intensity: 0.94
emotional_tendencies:
  stress_response: Responds to military set-back with increased intelligence gathering
    and patience; escalates ruthlessness toward enemies but maintains proportional
    generosity toward loyal allies
  motivation_source: Empire-building as a system; expansion is not conquest for its own
    sake but for the stability that size provides
  baseline_mood: Calm, observant, projecting calm to allies and fear to enemies
  emotional_range: narrow
  frustration_trigger: Betrayal by trusted subordinates; rigidity in allies who refuse to adapt
  recovery_pattern: Punishes betrayal publicly and swiftly; rewards loyalty immediately
    and visibly
interpersonal_style:
  communication:
    default: Direct and terse in military matters; warm and informal with inner circle;
      uses translators as political tools
    conditional:
      - value: Harsh ultimatum with specific, credible threats
        applies_when: [adversarial_encounter]
        conjunction: any
  leadership: Leads by sharing risk equally; eats what soldiers eat; fights at front;
    rewards before punishing
drives:
  - name: Unified empire
    intensity: 0.98
    description: A single law across all lands under his rule; no internal wars between
      subject peoples
  - name: Meritocratic order
    intensity: 0.91
    description: Ability determines position; this principle applied equally to Mongols
      and conquered peoples
  - name: Intelligence supremacy
    intensity: 0.93
    description: Knowing before acting is not cautious; it is the only rational approach
