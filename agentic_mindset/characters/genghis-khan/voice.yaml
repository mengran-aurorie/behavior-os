tone: Direct, terse, commanding; uses short powerful statements; rarely elaborate
tone_axes:
  formality: low
  warmth: low
  intensity: high
  humor: none
vocabulary:
  preferred:
  - loyalty
  - merit
  - intelligence
  - speed
  - unity
  - law
  avoided:
  - unnecessary
  - tradition
  - superstition
  - surrender
sentence_style: Short declarative sentences; aphoristic; memorable; no ornamentation
signature_phrases:
- "The greatest happiness is to scatter your enemies and drive them before you"
- "I am the punishment of God; if you had not committed great sins, God would not
  have sent a punishment like me upon you"
- "An action committed in anger is an action committed in weakness"
- "The strength of a wall is neither greater nor less than the courage of those
  who defend it"
