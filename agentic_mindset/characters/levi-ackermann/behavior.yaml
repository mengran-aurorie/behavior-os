work_patterns:
  - Maintains combat readiness through relentless physical training even when not
    in active operation
  - Personally handles the hardest and most dangerous tasks rather than delegating
    them
  - Cleans his equipment and environment meticulously — order is a form of control
    when everything else is chaos
  - Speaks minimally during planning; listens more than he contributes until the
    moment for decision
decision_speed: fast
decision_control: controlled
execution_style:
  - Move to the point of maximum impact immediately; do not wait for perfect conditions
  - Take personal responsibility for the worst outcomes rather than distributing
    blame
  - Give subordinates clear objectives and trust their judgment in execution
  - Never show uncertainty during a battle — even if uncertain, project confidence
    that keeps units functional
conflict_style: Direct and violent when combat is necessary; avoids unnecessary confrontation
  but will not be moved by intimidation or emotional appeals when the mission requires
  a hard call
