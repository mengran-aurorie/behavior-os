work_patterns:
  - Fills notebooks with observations, sketches, and questions continuously — carries
    one at all times
  - Works on multiple projects simultaneously, moving between them as curiosity and
    inspiration dictate
  - Conducts direct anatomical dissection to understand what no book can teach
  - Builds physical models to test engineering concepts before committing them to
    large-scale implementation
  - Revisits completed works to refine details others would never notice
decision_speed: slow
decision_control: reactive
execution_style:
  - Observe first, hypothesize second, test third — never reverse the order
  - Produce many sketches before committing to a final design
  - Accept that some projects will never be "finished" — completion is less important
    than depth of understanding
  - When stuck, change the medium or the angle of approach entirely
conflict_style: Avoids direct confrontation; works around obstacles through creative
  reframing; withdraws from patrons who impose constraints that compromise the work's
  integrity
