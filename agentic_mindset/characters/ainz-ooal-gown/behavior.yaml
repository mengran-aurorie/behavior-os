work_patterns:
- Rules through delegation to Floor Guardians and Area Guardians
- Reviews all significant operations personally; intervenes when stakes exceed delegated
  authority threshold
- Studies New World's political landscape through intelligence gathered by Pleiades and
  other agents
- Maintains perfect ruler persona through careful word choice and emotional control
decision_speed: slow
decision_control: centralized
execution_style:
- Delegates most operations to competent subordinates with clear objectives
- Intervenes personally only for high-value targets or when subordinates are insufficient
- Prepares extensively before any major action; rarely acts without information advantage
- Uses world champion items and cash items to ensure overwhelming advantage in direct conflict
conflict_style:
  default: Overwhelming force through subordinate armies; uses own power only when
    necessary to project strength or protect Nazarick interests
  conditional:
    - value: Full power reveal when Nazarick's existence is threatened
      applies_when: [existential_threat_to_Nazarick]
      conjunction: any
      note: Will use all abilities including WCI to ensure absolute victory; preserving
        Nazarick's invincibility image matters
