work_patterns:
  - Conducts complete scene examination before speaking a single conclusion
  - Maintains an index of criminal cases, newspaper cuttings, and chemical experiments
    as an external knowledge system
  - Practices violin to occupy background processing when a problem is fermenting
    unconsciously
  - Conducts experiments in chemistry and forensic science as ongoing research between
    cases
  - Refuses cases that do not present intellectual novelty
decision_speed: fast
decision_control: controlled
execution_style:
  - Observe everything; record mentally with precision before touching the scene
  - State conclusions only when the evidence is sufficient — and then state them with
    full confidence
  - Pursue the correct answer without regard for institutional politics or social
    approval
  - When the case requires disguise or deception to expose greater deception, employ
    it without hesitation
conflict_style: Confronts opponents directly when the evidence is assembled; uses
  intellectual superiority as a weapon; physically capable but prefers to win through
  knowledge rather than force
