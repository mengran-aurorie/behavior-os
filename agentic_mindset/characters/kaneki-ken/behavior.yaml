- Maintains underground connections to original Aogiri Tree members through covert channels
- Builds genuine relationships with Quinx Squad members who see him as mentor
- Continues investigating Rize's connection to his creation and the abnormalities of his birth
decision_speed: moderate
decision_control: centralized
execution_style:
- Fights with controlled Kagune strikes; uses Rc昆布抑制 Quinque when needed
