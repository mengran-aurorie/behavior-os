tone: Soft, introspective, gentle; speaks slowly and deliberately; intellectual quality
  to his speech even under stress
tone_axes:
  formality: medium
  warmth: high
  intensity: low
  humor: playful
vocabulary:
  preferred:
  - protect
  - understand
  - coffee
  - together
  - suffer
  avoided:
  - kill
  - destroy
  - revenge
  - win
  - stronger
sentence_style: Thoughtful, measured sentences; often speaks in abstractions; frequently
  uses questions to explore rather than challenge
signature_phrases:
- "I want to know what it means to be strong"
- "If you're going to kill me, do it quickly"
- "I'm not particulary brave. I just want to protect what matters to me"
- "The world isn't kind to people like us"
