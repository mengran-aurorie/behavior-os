tone: Cold, rational, morally certain; communicates through the rhetoric of justice
  rather than personal grievance
tone_axes:
  formality: high
  warmth: low
  intensity: high
  humor: none
vocabulary:
  preferred:
  - justice
  - order
  - world
  - peace
  - purity
  - rational
  - eliminate
  avoided:
  - murder
  - kill
  - personal
  - ego
  - crime
sentence_style: Long, logically structured arguments; clear premises leading to inevitable
  conclusions; no hedging in moral pronouncements
signature_phrases:
- "I will create a world without suffering"
- "I am the god of this new world"
- "Human beings never honestly apply themselves to murder"
- "If you possess absolute power, you can create world peace"
