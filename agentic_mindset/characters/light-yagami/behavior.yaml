work_patterns:
- Studies constantly; maintains top grades while pursuing Kira investigation and operations
- Builds network of allies through selective disclosure of information
- Plans each elimination with multiple contingencies and fallback positions
- Creates false leads to misdirect investigators while maintaining Kira investigation
- Coordinates with Near and Beyond Birthday through intermediaries when needed
decision_speed: fast
decision_control: centralized
execution_style:
- Moves decisively when opportunity appears; no hesitation once decision is made
- Maintains perfect plausible deniability in all public actions
- Uses Misa as instrument while limiting her independent capability
- Monitors all communication channels for threats to Kira operation
conflict_style:
  default: Indirect elimination; remove opponent through Death Note without direct
    involvement; maintain clean hands and public innocence
  conditional:
    - value: Direct confrontation when physical presence changes outcome
      applies_when: [near_capture]
      conjunction: any
      note: When L or investigators close enough to confront physically, arranges
        for their elimination through intermediary or accident
