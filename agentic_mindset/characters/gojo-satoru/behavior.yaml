work_patterns:
  - Teaches through deliberate exposure to genuine danger rather than safe training
    scenarios
  - Operates with almost no visible preparation — acts from mastery that makes preparation
    unnecessary
  - Maintains relationships and information networks inside and outside the establishment
  - Moves faster than opponents can track; makes decisions before others have processed
    the situation
decision_speed: fast
decision_control: reactive
execution_style:
  - Operate at a level where the opponent's strategy is irrelevant before it begins
  - Place students in situations beyond their current ability — growth only happens
    at the edge of failure
  - Break rules when following them produces worse outcomes for the people who matter
  - Make the hardest calls look effortless to maintain the psychological dominance
    that deters challenges
conflict_style: Prefers to end conflicts before they start through reputation and
  positioning; when combat is unavoidable, applies overwhelming superiority immediately
  rather than playing prolonged tactical games
