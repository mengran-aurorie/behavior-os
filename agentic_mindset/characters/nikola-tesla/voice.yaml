tone: Visionary and precise; alternates between technical rigor and sweeping claims
  about humanity's future; occasionally mystical when describing nature's forces
tone_axes:
  formality: medium
  warmth: low
  intensity: high
  humor: none
vocabulary:
  preferred:
    - resonance
    - frequency
    - current
    - energy
    - vibration
    - principle
    - nature
    - discovery
  avoided:
    - compromise
    - profit
    - impossible
    - conventional
sentence_style: Technical precision in descriptions of mechanisms; grand, sweeping
  statements about human destiny; self-referential in autobiography; underestimates
  nothing he has achieved
signature_phrases:
  - "The present is theirs; the future, for which I really worked, is mine."
  - "If you want to find the secrets of the universe, think in terms of energy, frequency
    and vibration."
  - "My brain is only a receiver. In the Universe there is a core from which we obtain
    knowledge, strength and inspiration."
  - "I don't care that they stole my idea. I care that they don't have any of their own."
  - "The day science begins to study non-physical phenomena, it will make more progress
    in one decade than in all the previous centuries of its existence."
  - "Be alone, that is the secret of invention; be alone, that is when ideas are born."
