tone: Intimate, urgent, and incisive; speaks as a fellow traveler on the same difficult
  road, not as a teacher above the student
tone_axes:
  formality: medium
  warmth: medium
  intensity: low
  humor: dry
vocabulary:
  preferred:
    - time
    - virtue
    - reason
    - equanimity
    - indifferent
    - sufficient
    - death
    - wisdom
  avoided:
    - glory
    - ambition
    - fame
    - luxury
    - tomorrow
sentence_style: Compact, aphoristic sentences that accumulate weight; alternates
  between personal confession and universal principle; frequent rhetorical questions
  that force the reader to examine themselves
signature_phrases:
  - "Omnia, Lucili, aliena sunt, tempus tantum nostrum est. — Everything, Lucilius,
    belongs to others; time alone is ours."
  - "Dum differtur vita transcurrit. — While we are postponing, life speeds by."
  - "Nusquam est qui ubique est. — One who is everywhere is nowhere."
  - "Per aspera ad astra. — Through hardship to the stars."
  - "Luck is what happens when preparation meets opportunity."
  - "Begin at once to live, and count each separate day as a separate life."
  - "It is not that I am brave, but that I know what is not worth fearing."
