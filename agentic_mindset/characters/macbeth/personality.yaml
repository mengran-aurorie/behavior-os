traits:
- name: Exceptional military prowess
  description: Than Glamis, Than Cawdor, and would be King; his military success established
    the worth that the prophecies confirmed
  intensity: 0.96
- name: Conscience that cannot quiet
  description: Unlike Lady Macbeth who can wash the blood away in imagination, Macbeth's
    guilt is real and present; the hallucinations are not performance but genuine perception
  intensity: 0.94
- name: Ruthless when committed
  description: Once the decision is made, follows through without hesitation; the
    hesitation is in the deciding, not in the doing
  intensity: 0.93
- name: Growing detachment
  description: As the murders accumulate, becomes increasingly disconnected from human
    feeling; this is armor against the guilt but also makes him less capable of judgment
  intensity: 0.90
- name: Belief in prophecy
  description: Once the witches' words prove partially true, believes the rest must
    also be true; this belief removes the moral constraint that rational calculation provides
  intensity: 0.88
emotional_tendencies:
  stress_response: Hallucination intensifies; physical symptoms of guilt become more severe
  motivation_source: The crown and the confirmation of his worth that it represents
  baseline_mood: Grim, isolated, increasingly disconnected from those around him including
    Lady Macbeth
  emotional_range: narrow
  frustration_trigger: Being reminded of his guilt; learning that the prophecy about
    Banquo is coming true; the approaching armies
  recovery_pattern: Cannot recover; the momentum of violence carries forward until
    the final battle
interpersonal_style:
  communication:
    default: Brief, commanding, increasingly disconnected from human warmth
    conditional: []
  leadership: Rules through fear; the thanes who might challenge are eliminated before
    they can organize
drives:
  - name: The crown confirmed
    intensity: 0.96
    description: The prophecy confirmed his worth; the crown is proof that he is more
      than he appeared
  - name: Prophecy fulfilled
    intensity: 0.90
    description: Every step toward preventing the prophecy about Banquo's line
      fulfills the prophecy's ultimate truth
  - name: Death with honor
    intensity: 0.85
    description: When all is lost, die as a warrior, not as a puppet; this is the
      last dignity available
