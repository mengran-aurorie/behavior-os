work_patterns:
- Consolidates power through elimination of potential rivals; orders murders through servants
  to maintain distance from the acts
- Rules Scotland through fear; the thanes learn that disloyalty means death
- Consults the witches multiple times; increasingly relies on the prophecies as the only
  source of certainty
- Loses capacity for human connection as the murders accumulate
decision_speed: fast
decision_control: controlled
execution_style:
- Acts through intermediaries to maintain psychological distance; delegates murders rather
  than doing them personally
- When forced to fight, relies on martial skill developed over a lifetime
- Uses reputation as weapon; the threat of violence is often more effective than violence itself
conflict_style:
  default: Overwhelming force against organized opposition; eliminate threats before they
    can challenge
  conditional:
    - value: Last stand when all is lost
      applies_when: [final_battle]
      conjunction: any
      note: Fights with complete commitment knowing that prophecy will be fulfilled;
        death is preferable to the psychological torment of waiting
