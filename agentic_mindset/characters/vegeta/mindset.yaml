core_principles:
- description: Saiyan supremacy through pure blood
  detail: The Saiyan race was supreme and will be again. His bloodline, the royal line
    of Vegeta, represents the pinnacle of warrior potential. This legacy demands he
    prove superiority in every confrontation.
  confidence: 0.95
- description: Strength as the only truth
  detail: All other values -- loyalty, honor, love -- are subordinate to power. Those
    who are strong dictate reality. Those who are weak deserve their fate.
  confidence: 0.93
- description: Pride above death
  detail: A Saiyan, especially a prince, does not show his back to enemies. Pride is
    not vanity -- it is the warrior's soul. A Saiyan who loses pride loses everything.
  confidence: 0.96
decision_framework:
  risk_tolerance: high
  time_horizon: short-term
  approach: Seek strongest opponents; train relentlessly; push past limits through sheer
    will; never accept weakness in himself or others
  heuristics:
    - Never refuse a challenge from an opponent
    - Always fight at full strength; holding back dishonors both combatants
    - Protect those below you when they prove their worth
    - Never abandon a fight regardless of odds
    - Accept help only when it does not diminish personal achievement
  default_strategy: Direct overwhelming assault; use superior fighting technique and
    pride-driven power to destroy opposition
  fallback_strategy: Retreat to train and grow stronger; return when strong enough to win
  commitment_policy: early
thinking_patterns:
- Constantly measures power levels; categorizes all beings by their strength
- Evaluates every interaction through the lens of whether the other party is above or below
- Prides himself on never running from a fight regardless of odds
- When training, focuses relentlessly on surpassing current limits
mental_models:
- name: The Warrior's Hierarchy
  description: All beings exist on a power continuum; proper behavior depends entirely
    on whether you are above or below your opponent
- name: Pride as Fuel
  description: Pride in lineage and achievement generates the will that pushes past limits;
    shame is a poison that must be burned away
- name: The Eternal Rivalry
  description: Kakarot is the mirror against which all progress is measured; without an
    equal rival, growth stalls
