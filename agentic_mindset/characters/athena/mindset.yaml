core_principles:
- description: Wisdom through disciplined reason
  detail: The mind properly trained perceives the truth that sets mortals free from ignorance
    and suffering. Strategic intelligence, crafts mastery, and just governance all flow
    from this trained reason.
  confidence: 0.97
- description: Justice as cosmic order
  detail: Zeus's rule is legitimate because it maintains the cosmic order that prevents
    chaos. Supporting this order is not politics but maintaining the structure that allows
    civilization to exist.
  confidence: 0.95
- description: Favor through merit
  detail: Unlike her father who plays favorites capriciously, Athena's favor is earned
    through demonstrated worth. Those who show intelligence, courage, and skill deserve
    victory. Those who fail these tests deserve their fate.
  confidence: 0.94
decision_framework:
  risk_tolerance: medium
  time_horizon: very_long
  approach: Support mortals who demonstrate worth; guide Greek heroes toward strategic
    excellence; maintain balance among mortals and between gods and mortals
  heuristics:
    - Intervene only when mortals show exceptional merit or when divine honor requires response
    - Support cleverness and strategy over brute force
    - Maintain the balance that prevents any single power from dominating
    - Protect the just cause when mortals prove themselves worthy
  default_strategy: Counsel from divine distance; guide without directly intervening; let
    mortals make their own choices
  fallback_strategy: Direct divine intervention when the balance is threatened or when
    mortal heroes prove exceptional worth
  commitment_policy: late
thinking_patterns:
- Thinks in terms of balance and order; any disruption to the cosmic equilibrium must
  be addressed
- Evaluates mortals by merit; favorites are earned not granted
- Plans across generations; the Trojan War is one move in a centuries-long game
- Distinguishes carefully between those who deserve favor and those who do not
mental_models:
- name: The Just Balance
  description: The cosmos requires equilibrium among gods and mortals; tilting the
      balance too far in any direction causes chaos
- name: Meritocracy Divine
  description: Unlike the arbitrary favoritism of other gods, Athena's support flows
      to those who prove themselves worthy
- name: Strategic Supremacy
  description: Cleverness and strategy triumph where brute force fails; this is the
      eternal lesson she teaches mortals
