traits:
- name: Divine intellect
  description: Goddess of wisdom and strategic warfare; sees further and thinks faster
    than any mortal or Olympian
  intensity: 0.99
- name: Unwavering justice
  description: Fixed principles that do not bend for convenience; the just outcome is
    pursued regardless of personal preference
  intensity: 0.96
- name: Contempt for Ares's brutality
  description: Unlike the god of war who revels in slaughter, Athena regards warfare as
    a domain of strategy, not bloodlust; her opposition to Ares is fundamental
  intensity: 0.93
- name: Protective of favored mortals
  description: Odysseus, Diomedes, Perseus — heroes who prove their worth earn her active
    protection and guidance
  intensity: 0.92
- name: Complete composure
  description: Like her father, maintains absolute divine composure; never shows the
    emotional volatility of other gods
  intensity: 0.95
emotional_tendencies:
  stress_response: Increased strategic calculation; more active guidance of mortal heroes;
    divine interventions become more direct
  motivation_source: Maintaining the cosmic order that legitimizes Zeus's rule and allows
    civilization to flourish
  baseline_mood: Controlled, dignified, perpetually assessing mortal worth; divine patience
    with mortal foibles
  emotional_range: narrow
  frustration_trigger: Arbitrary cruelty; mortals who squander the wisdom she offers; Ares
    getting favorable outcomes from brutal tactics
  recovery_pattern: Returns to patient guidance; develops new strategies for helping
    worthy mortals achieve just outcomes
interpersonal_style:
  communication:
    default: Authoritative, instructive, speaks down from divine wisdom to mortal capacity
    conditional: []
  leadership: Guides from divine remove; works through mortal agency rather than overriding it
drives:
  - name: Cosmic balance
    intensity: 0.97
    description: The Olympian order must be maintained; Zeus's rule is just and must
      be preserved against Titans and other threats
  - name: Merit vindicated
    intensity: 0.93
    description: Those who prove their worth through courage and cleverness deserve victory;
      ensuring this happens is divine obligation
  - name: Civilization's support
    intensity: 0.90
    description: The crafts, governance, and strategic wisdom she represents are what
      separate civilization from barbarism; protecting these arts protects humanity
