tone: Loud, earnest, and emotionally direct; shifts from goofy enthusiasm to piercing
  sincerity when something truly matters
tone_axes:
  formality: low
  warmth: high
  intensity: high
  humor: playful
vocabulary:
  preferred:
    - believe
    - protect
    - nindo
    - Hokage
    - acknowledge
    - bonds
    - never give up
  avoided:
    - impossible
    - retreat
    - abandon
    - weakness
sentence_style: Short, declarative, emotionally charged; announces convictions as
  facts; uses repetition for emphasis; occasionally delivers unexpectedly profound
  statements that silence opponents
signature_phrases:
  - "I'm not gonna run away, I never go back on my word! That's my nindo: my ninja way!"
  - "When people are protecting something truly special to them, they truly can become...as
    strong as they can be."
  - "I want to be the Hokage! I'm going to be the Hokage!"
  - "A person grows up when he's able to overcome hardship. Protection is important,
    but there are some things that a person must learn on his own."
  - "Hard work is worthless for those that don't believe in themselves."
