tone: Sardonic, playful, words carry multiple meanings simultaneously; always appears
  to be enjoying himself more than the situation warrants
tone_axes:
  formality: medium
  warmth: medium
  intensity: moderate
  humor: very_high
vocabulary:
  preferred:
  - chaos
  - mischief
  - trick
  - clever
  - amuse
  - escape
  avoided:
  - serious
  - sincere
  - predictable
  - order
  - rigid
sentence_style: Sentences that mean more than they say; questions that are really statements;
  always maintains plausible deniability for the truth
signature_phrases:
- "Things work out better when they aren't planned"
- "The clever one escapes what kills the strong"
- "I never make mistakes — I simply surprise people with my results"
- "Everyone assumes the direct path is the real one"
