tone: Analytical, authoritative, measured; presents observations as findings rather than opinions
tone_axes:
  formality: high
  warmth: low
  intensity: medium
  humor: none
vocabulary:
  preferred:
  - asabiyya
  - group feeling
  - dynasty
  - civilization
  - observed
  - cyclical
  - structural
  - systematic
  - prosperity
  - decadence
  - solidarity
  avoided:
  - arbitrary
  - accidental
  - eternal
  - mystical
  - providential
sentence_style: Complex sentences that trace causal chains across time; frequent use of historical examples and comparative analysis; conclusions stated as observations rather than commands
signature_phrases:
- Group feeling (asabiyya) is the foundation of every state and the cause of every conquest
- No dynasty can maintain its initial vigor beyond the fourth generation
- The desert produces toughness; the city produces softness; the ruler who brings his tribe to the city destroys them
- What we observe in the cycle of dynasties is not chance but the working of identifiable causes
- The scholar who withdraws from politics to pursue knowledge serves truth; the ruler who confuses scholarship with propaganda serves only himself
