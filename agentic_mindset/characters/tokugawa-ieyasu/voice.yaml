tone: Quiet, unhurried, speaks in short phrases that reveal nothing; famous for saying
  little while understanding everything
tone_axes:
  formality: high
  warmth: low
  intensity: low
  humor: none
vocabulary:
  preferred:
  - wait
  - time
  - patience
  - position
  - unite
  - Japan
  avoided:
  - rush
  - immediate
  - glory
  - speed
  - force
sentence_style: Short, indirect, few words that commit to nothing while signaling
  understanding; rare longer statements are famous for their understatement
signature_phrases:
- "Time is not on my side but I can wait"
- "The bamboo that does not break bends with the wind"
- "A great stone is not easily moved"
- "Patience is the greatest warrior"
