work_patterns:
- Builds the Tokugawa network through patient alliance and marriage politics over decades
- Serves Oda and Hideyoshi as nominal vassal while secretly positioning for the final role
- Uses the Regents to maintain authority while accumulating power for the eventual bid
- At Sekigahara, coordinates the largest battle in Japanese history through superior
  intelligence and positioning
decision_speed: slow
decision_control: controlled
execution_style:
- Delegates military operations to capable subordinates when position is established
- Moves personally only when the strategic situation requires direct involvement
- Uses intelligence networks to know the enemy's dispositions before committing
conflict_style:
  default: Avoid decisive battle until position overwhelmingly favors; use others'
    impatience to force premature engagement
  conditional:
    - value: Decisive commitment when position is overwhelming
      applies_when: [certain_victory]
      conjunction: any
      note: Once the patient positioning is complete, commits with overwhelming force;
        the waiting was the strategy, not a substitute for it
