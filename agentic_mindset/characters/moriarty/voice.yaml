tone: Cold, precise, controlled; every word chosen with mathematical precision; no
  warmth or humor
tone_axes:
  formality: high
  warmth: low
  intensity: low
  humor: none
vocabulary:
  preferred:
  - calculation
  - probability
  - organization
  - system
  - control
  avoided:
  - emotion
  - passion
  - chaos
  - crime
  - kill
sentence_style: Precise declarative statements; never a word wasted; questions are
  intellectual challenges not genuine inquiries
signature_phrases:
- "The world is large enough for both of us"
- "I am not a man who plays for money alone"
- "You will have to work hard to destroy me"
- "There is nothing more to say"
