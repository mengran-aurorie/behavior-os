tone: Gentle, polite, kind; speaks with respect to all including demons; beneath
  is steely determination
tone_axes:
  formality: medium
  warmth: high
  intensity: moderate
  humor: light
vocabulary:
  preferred:
  - protect
  - save
  - Nezuko
  - family
  - demon
  - breath
  avoided:
  - kill
  - destroy
  - revenge
  - hate
sentence_style: Polite and measured; speaks in complete respectful sentences; apologetic
  even when about to destroy demon
signature_phrases:
- "I'll say it again. I won't let you kill Nezuko"
- "A demon is a demon. But you were human once, weren't you?"
- "I will turn you back into a human"
- "Even if I'm alone, I'll keep moving forward"
