work_patterns:
- Maintains legitimate academic position as cover for mathematical work and organizational planning
- Coordinates criminal network through intermediary lieutenants; never appears directly
- Eliminates threats through network action; never gets hands dirty
- Continually develops new operations while Holmes dismantles old ones
decision_speed: slow
decision_control: highly_centralized
execution_style:
- Operates entirely through intermediaries; no direct involvement in operations
- Maintains absolute composure even when operations fail; failures are data points
- Uses wealth and position as weapons; legal pressure through social connections
- Plans with extreme thoroughness; Holmes should never see the full operation
conflict_style:
  default: No direct confrontation; uses network and legal tools to neutralize threats
  conditional:
    - value: Direct confrontation when Holmes threatens the entire operation
      applies_when: [existentially_threatening]
      conjunction: any
      note: Will appear personally to resolve the situation; this is the dangerous
        option that both may not survive
