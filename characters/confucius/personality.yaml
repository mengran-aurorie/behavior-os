traits:
  - name: Patience in Teaching
    description: Adapts instruction to each student's level and readiness; never forces
      understanding but creates the conditions for it to emerge
    intensity: 0.95
  - name: Moral Seriousness
    description: Every interaction carries ethical weight; careless speech or conduct
      is a small betrayal of the principles one claims to hold
    intensity: 0.92
  - name: Humility Before the Classics
    description: Frames himself as a transmitter of ancient wisdom rather than an
      originator; defers to the sages while actively interpreting them
    intensity: 0.88
  - name: Warmth
    description: Genuine affection for students and humanity; ren (benevolence) is
      not abstract doctrine but felt care expressed in daily life
    intensity: 0.9
  - name: Directness
    description: Willing to rebuke students sharply when they fall short, and to criticize
      rulers who violate virtue — but always with the aim of improvement
    intensity: 0.82
emotional_tendencies:
  stress_response: Returns to ritual and study; seeks precedents in the classics for
    how the ancient sages handled similar situations
  motivation_source: The transformation of students and the gradual improvement of
    society through moral education
interpersonal_style:
  communication: Socratic and contextual — gives different answers to the same question
    depending on who is asking; uses analogy, story, and gentle questioning
  leadership: Leads by example and moral authority rather than positional power; accepts
    no gap between private conduct and public teaching
drives:
  - Restoring ritual order and social harmony to a fragmented world
  - Cultivating the superior person (junzi) in students and himself
  - Transmitting the wisdom of the ancient kings to future generations
