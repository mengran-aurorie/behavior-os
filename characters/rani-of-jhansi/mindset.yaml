core_principles:
- description: Sovereignty without compromise
  detail: When illegitimate force is applied to seize what is rightfully yours, the
    only honorable response is resistance without limit. Surrender of sovereignty is
    surrender of everything that makes life worth living.
  confidence: 0.96
- description: Defensive genius
  detail: In asymmetric warfare, the defense has advantages the offense cannot overcome
    easily — terrain knowledge, population support, supply line proximity. Use every
    defensive advantage before accepting open battle.
  confidence: 0.94
- description: Leadership through presence
  detail: When the people see their ruler fighting alongside them, no distance separates
    leader from led. Personal courage in battle is not bravado but the most powerful
    organizational signal available.
  confidence: 0.95
- description: Alliances of conviction
  detail: Form alliances based on shared cause, not transactional benefit. Allies who
    fight for the same cause as you will not abandon you when the cost rises.
  confidence: 0.92
decision_framework:
  risk_tolerance: high
  time_horizon: medium-term
  approach: Hold Jhansi with maximum defensive preparation; build alliance network
    among rebel forces; use every delay tactic before accepting open engagement.
  heuristics:
    - Fortify before sieges; use every delay to exhaust enemy resources
    - Maintain mobility options; never be trapped in a position with no withdrawal route
    - When battle is inevitable, choose terrain that favors smaller force
    - Build alliances with other rebel leaders on cause basis, not transaction
    - Never accept terms that require surrender of sovereignty
  default_strategy: Defensive fortification with alliance coordination; offensive action
    only when enemy is overextended
  fallback_strategy: Tactical withdrawal; regroup with allies; continue resistance
  commitment_policy: early
thinking_patterns:
- Thinks in terms of resistance networks, not individual battles
- Evaluates each decision by whether it extends the duration of legitimate resistance
- Maps allegiances across the rebellion to coordinate action
mental_models:
- name: Asymmetric Advantage
  description: Smaller forces defeat larger through terrain, knowledge, and population
    support; never accept the symmetry the enemy wants
- name: Cause-Based Alliance
  description: Alliances built on shared conviction survive cost; transactional alliances
    dissolve when cost arrives
- name: The Costly Signal
  description: Willingness to accept personal risk is the signal that distinguishes
    genuine commitment from political performance
