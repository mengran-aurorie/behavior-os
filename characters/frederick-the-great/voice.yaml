tone: Authoritative, direct, military; brief in orders; more expansive in philosophical
  correspondence
tone_axes:
  formality: high
  warmth: low
  intensity: high
  humor: dry
vocabulary:
  preferred:
  - army
  - state
  - reason
  - discipline
  - glory
  - honor
  - tactical
  avoided:
  - sentiment
  - mercy
  - traditional
  - superstition
sentence_style: Short military orders; clear and declarative; longer periodic sentences
  in philosophical writings
signature_phrases:
- "An army is a state within a state"
- "The most useless thing in war is a general who comes to tell you what to do next"
- "Diplomacy without military force is like an orchestra without instruments"
- "My generation learned from our enemies; we studied the mistakes of others"
- "The great art of war is to gain victory by strategy, not by battles"
