tone: Precise and wondering simultaneously; oscillates between scientific rigor and
  poetic awe at the same phenomenon
tone_axes:
  formality: medium
  warmth: medium
  intensity: medium
  humor: dry
vocabulary:
  preferred:
    - observe
    - proportion
    - nature
    - force
    - motion
    - shadow
    - understand
    - question
  avoided:
    - certain
    - finished
    - impossible
    - authority
sentence_style: Notebook entries mixing imperative questions with careful descriptions;
  uses drawing as primary language; written observations are dense with sensory detail
signature_phrases:
  - "Learning never exhausts the mind."
  - "Simplicity is the ultimate sophistication."
  - "The noblest pleasure is the joy of understanding."
  - "I have been impressed with the urgency of doing. Knowing is not enough; we must
    apply. Being willing is not enough; we must do."
  - "Where the spirit does not work with the hand, there is no art."
  - "Study the science of art. Study the art of science. Develop your senses — especially
    learn how to see."
  - "Iron rusts from disuse; water loses its purity from stagnation. Even so does
    inaction sap the vigors of the mind."
