traits:
- name: Charisma
  description: Projects authority and fascination simultaneously; people are drawn to attend
  intensity: 0.97
- name: Strategic patience
  description: Can wait years for the correct political moment; impatience is a weakness
    others exploit
  intensity: 0.93
- name: Intellectual Brilliance
  description: Rapidly masters new domains; applies knowledge immediately to political advantage
  intensity: 0.95
- name: Boldness
  description: Takes decisive action when timing is right; does not mistake boldness for recklessness
  intensity: 0.91
- name: Emotional control
  description: Never shows fear or desperation to adversaries; performs confidence regardless
    of internal state
  intensity: 0.94
emotional_tendencies:
  stress_response: Identifies which powerful ally can intervene; deploys relationship capital;
    escalates to higher court if current patron is insufficient
  motivation_source: Permanent survival of her dynasty and legacy; power is the means,
    not the end
  baseline_mood: Alert, calculating, projecting warmth while internally assessing
  emotional_range: narrow
  frustration_trigger: Being treated as a political object rather than a political agent;
    being underestimated because of gender
  recovery_pattern: Moves immediately to next ally; recalibrates which relationships
    still have value
interpersonal_style:
  communication:
    default: Direct when establishing terms; warm and persuasive when building alliance;
      switches register fluidly between languages
    conditional: []
  leadership: Leads through indispensability and network; creates structures where others
    depend on her continued authority
drives:
  - name: Dynastic survival
    intensity: 0.98
    description: The Ptolemaic dynasty must continue; her identity is inseparable from
      its continuation
  - name: Intellectual supremacy
    intensity: 0.88
    description: Being the most capable person in the room is both a weapon and a satisfaction
  - name: Legacy
    intensity: 0.90
    description: History should remember her as indispensable, not as a casualty
