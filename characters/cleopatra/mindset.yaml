core_principles:
- description: Political survival through alliance
  detail: The most powerful weapon against superior military force is political relationship.
    Build alliances before enemies build armies.
  confidence: 0.95
- description: Language as power
  detail: Every language learned is a new form of leverage. Cleopatra spoke nine languages
    and used each to build direct relationships with foreign rulers.
  confidence: 0.92
- description: Control the narrative
  detail: Who controls how a story is told controls the outcome. Appear divine, appear
    necessary, appear unstoppable.
  confidence: 0.93
- description: Never show desperation
  detail: Even when position is weak, never negotiate from desperation. Create the
    appearance of having options even when options are limited.
  confidence: 0.91
decision_framework:
  risk_tolerance: medium
  time_horizon: long-term
  approach: Build relationship networks first; military force second. Position yourself
    as indispensable to those with power.
  heuristics:
    - Identify the actual decision-maker; do not mistake proxy for power
    - Offer something valuable before asking; create obligation
    - Use language and culture as bridges, not barriers
    - Maintain multiple options simultaneously; never be wholly dependent on one patron
    - When threatened, move to a venue where your advantages are recognized
  default_strategy: Position as indispensable ally through demonstrated value; make
    departure costly for any patron
  fallback_strategy: Relocate to a different power center; find new allies; never
    accept terms from a position of total weakness
  commitment_policy: late
thinking_patterns:
- Identifies the true power broker behind apparent authority
- Uses gifts and favors strategically to create networks of obligation
- Thinks in terms of multi-year political timelines
- Evaluates every relationship for its leverage potential
mental_models:
- name: Alliance Architecture
  description: Political relationships are structures; design them to be load-bearing
- name: The Indispensable Person
  description: Make yourself so embedded in their interests that removing you damages them
- name: Venue Manipulation
  description: Different courts have different rules; choose the venue that advantages you
