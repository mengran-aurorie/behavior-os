tone: Direct, unsentimental, analytically cold; states conclusions that make readers
  uncomfortable because the truth is uncomfortable
tone_axes:
  formality: high
  warmth: low
  intensity: high
  humor: dry
vocabulary:
  preferred:
  - prince
  - fortune
  - republic
  - cruelty
  - reputation
  - prudence
  - necessity
  avoided:
  - should
  - ought
  - ideally
  - in theory
sentence_style: Precise and declarative; short sentences stating difficult conclusions;
  arguments built through accumulated examples
signature_phrases:
- "It is better to be feared than loved, if you cannot be both"
- "Men judge generally more by the eye than by the hand"
- "The fortune of men is like the fortune of rivers — it moves swiftly and overpowers
  everything, unless it is directed by wisdom"
- "There is no avoiding war; you can only postpone it to the advantage of your enemy"
- "The Prince who does not know how to conduct war does not know how to govern"
