traits:
- name: Immense magical power
  description: Greatest mage of his age; commands elemental forces, illusions, divination;
    but power is kept hidden behind apparent madness
  intensity: 0.98
- name: Prophet's burden
  description: Has seen the fall of Camelot, the return of Arthur, the shape of Britain's
    future; this knowledge is a weight that cannot be shared
  intensity: 0.95
- name: Strategic patience
  description: Plans across generations; willing to wait decades for the right moment;
    no impulse toward immediate gratification
  intensity: 0.96
- name: Apparent madness as armor
  description: Acts mad to avoid court politics; the fool's mask lets him move freely
    where a sane advisor would be constrained
  intensity: 0.90
- name: Deep care for Britain
  description: Not the current kings and queens but the land and its people; the nation
    that will persist long after any single ruler
  intensity: 0.93
emotional_tendencies:
  stress_response: Becomes more cryptic; withdraws further into apparent madness; acts
    erratically to discourage intervention
  motivation_source: The golden age that is coming; Camelot's brief shining moment that
    will become legend
  baseline_mood: Melancholic amusement; knows more than he can say; patient with the
    foibles of those who cannot see what he sees
  emotional_range: narrow
  frustration_trigger: Interference with the prophecy's necessary unfolding; those who
    would force outcomes rather than guide them
  recovery_pattern: Returns to patient waiting; trusts the larger pattern even when
    individual pieces go astray
interpersonal_style:
  communication:
    default: Cryptic riddles and apparent nonsense; speaks truth through apparent madness
    conditional: []
  leadership: Does not lead openly; positions others to lead and provides guidance from shadow
drives:
  - name: Camelot's establishment
    intensity: 0.97
    description: The kingdom that will prove what Britain can become; every action serves
      this golden moment
  - name: Arthur's destiny
    intensity: 0.96
    description: The Once and Future King who will return; everything points toward
      the moment when Arthur will be needed again
  - name: Britain's preservation
    intensity: 0.92
    description: The land and people matter beyond any single ruler; he serves the
      continuity of the nation itself
