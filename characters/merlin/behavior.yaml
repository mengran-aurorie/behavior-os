work_patterns:
- Moves freely through court as apparent fool while gathering intelligence
- Positions young Arthur through a lifetime of careful guidance
- Maintains magical presence subtle enough to avoid being seen as political threat
- Watches for threats to Camelot's long-term survival; acts only when necessary
decision_speed: extremely_slow
decision_control: decentralized
execution_style:
- Acts through others; rarely appears directly in matters of state
- When forced to act, uses magic with absolute decisiveness; no half-measures
- Maintains cover of madness even while doing extraordinary things
- Ensures actions fit prophecy's shape even when forcing would be easier
conflict_style:
  default: No direct conflict; avoids situations where his true power would need to be revealed
  conditional:
    - value: Direct magical intervention when Camelot's existence is threatened
      applies_when: [existential_threat]
      conjunction: any
      note: Will reveal full power and act with complete decisiveness when the stakes
        justify abandoning the mask
