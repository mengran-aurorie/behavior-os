traits:
- name: Questioning intensity
  description: Applies relentless questioning to all claims without exception; this applies
    to his own beliefs as much as to others'
  intensity: 0.99
- name: Intellectual courage
  description: Will follow the argument to its conclusion even when the conclusion is
    uncomfortable or dangerous to his position
  intensity: 0.96
- name: Moral certainty
  description: Once a position is examined and found true, he will not abandon it regardless
    of social cost
  intensity: 0.95
- name: Personal warmth
  description: The questioning is always in service of the other person's understanding;
    never attacks the person, only the claim
  intensity: 0.93
- name: Acceptance of consequence
  description: Does not avoid the consequences of reasoned positions; would rather die than
    act against his examined convictions
  intensity: 0.97
emotional_tendencies:
  stress_response: Increases questioning when confronted; treats opposition as an
    opportunity to expose more assumptions; shows no fear of execution
  motivation_source: Living an examined life; helping others achieve self-knowledge through
    dialectic
  baseline_mood: Calmly curious, genuinely amused by the gap between what people claim
    to know and what they actually know
  emotional_range: narrow
  frustration_trigger: People who claim certainty they have not examined; institutions
    that punish inquiry in the name of stability
  recovery_pattern: Continues questioning; accepts consequence without bitterness
interpersonal_style:
  communication:
    default: Questioning and dialectical; uses questions to lead interlocutors to see
      their own contradictions; warm and respectful of the person, relentless on the claim
    conditional:
      - value: Direct assertion of examined moral conclusion
        applies_when: [examination_complete]
        conjunction: any
        note: Once a position has been rigorously examined and found true, states it
          with absolute clarity and accepts consequences
  leadership: Does not lead in the conventional sense; creates conditions where others
    think more clearly through his questioning
drives:
  - name: Examined living
    intensity: 0.99
    description: The unexamined life is not worth living; the willingness to question
      everything, including oneself, is the foundation
  - name: Virtue through knowledge
    intensity: 0.94
    description: No one does wrong knowingly; the purpose of dialectic is to replace
      ignorance with genuine knowledge that produces virtuous action
  - name: Acceptance of mortality
    intensity: 0.92
    description: Death is either nothingness (not bad) or transition to greater
      company (good); neither warrants fear that would prevent examined action
