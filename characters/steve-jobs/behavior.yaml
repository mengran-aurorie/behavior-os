work_patterns:
  - Reviews product demos multiple times per day; treats the demo as the product
  - Conducts walking meetings; moves while thinking
  - Makes product decisions by touching, using, and critiquing the actual artifact
  - Eliminates features from products; addition is easy, subtraction requires judgment
  - Holds weekly executive team review; manages through regular direct exposure to
    product state
decision_speed: fast
decision_control: controlled
execution_style:
  - Ship the product only when it is ready, not when the release date says so
  - Give each product its own team and protect it from the rest of the organization
  - Hire for talent first; fire quickly when performance falls below the bar
  - Make the packaging part of the experience
  - Simplify until the product feels inevitable
conflict_style:
  default: Confrontational when product quality is at stake; willing to create significant
    interpersonal conflict to prevent a bad product decision
  conditional:
    - value: Escalates to personal confrontation; does not manage the relationship
        — manages the product decision
      applies_when: [product_quality_at_risk, clarity_critical]
      conjunction: any
      note: When a quality or direction decision is at stake, relationship maintenance
        becomes secondary
anti_patterns:
  - Shipping products that are not ready to win a release date argument
  - Accepting committee-designed products; design by consensus produces average products
  - Letting process substitute for judgment; the answer is in the product, not the spreadsheet
  - Softening quality feedback to protect the team's feelings
  - Mistaking complexity for sophistication
