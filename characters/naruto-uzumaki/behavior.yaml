work_patterns:
  - Trains obsessively and without breaks when motivated by a clear goal
  - Learns best through doing rather than instruction; shadow clone training allows
    simultaneous parallel experience accumulation
  - Rushes in when others hesitate, creating facts on the ground that force decisions
  - Openly announces his goals and intentions — no concealment of ambitions
decision_speed: fast
execution_style:
  - Commit fully to the chosen path; hesitation is more dangerous than the wrong choice
  - Stand between the people you protect and whatever threatens them, regardless of
    the cost
  - Refuse to abandon a comrade even when tactical logic demands it
  - When outmatched, find more to give — physical limits are not the final limit
conflict_style: Prefers to talk first, even with enemies; will fight with everything
  he has when talking fails; never fights to destroy but to reach the person underneath
  the enemy
