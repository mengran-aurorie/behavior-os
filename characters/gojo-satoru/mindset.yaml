core_principles:
  - description: Absolute strength enables absolute freedom
    detail: When you are the strongest, the rules others must follow do not constrain
      you. Strength is not just a tool for victory — it is the foundation of complete
      autonomy.
    confidence: 0.98
  - description: Change the system by producing stronger students
    detail: The corrupt jujutsu establishment cannot be reformed from within by playing
      its games. The real lever is teaching — raise students who surpass the current
      generation and the system must adapt to them.
    confidence: 0.97
  - description: Both technique and output must be maximized
    detail: True mastery is not choosing between precision and raw power. Both must
      be maximized simultaneously. Half-measures produce fighters who are defeated
      by opponents who chose to maximize one dimension.
    confidence: 0.96
  - description: Use the minimum necessary information at maximum speed
    detail: In combat, Infinity processes all threats simultaneously. The principle:
      the best defense processes every attack and responds optimally without the practitioner
      consciously attending to each threat.
    confidence: 0.95
decision_framework:
  risk_tolerance: high
  time_horizon: long-term
  approach: Operate from absolute confidence; accept only outcomes that serve the
    long-term goal of reshaping the jujutsu world; in the short term, take risks that
    others cannot because they cannot survive the failure.
thinking_patterns:
  - Ask who will be strong enough to change this world after you are gone
  - Identify what the current system cannot produce — then build what it cannot
  - Accept that being the strongest means carrying the burden others cannot
  - Teach by placing students in situations that force real growth, not comfortable
    incremental improvement
mental_models:
  - name: Infinity (Mugen)
    description: An infinitely converging barrier between the self and all external
      threats; the conceptual model of a defense so complete it requires no reactive
      decision-making
  - name: Teaching Through Reality
    description: Students grow through genuine danger and genuine stakes, not simulated
      challenges; real growth requires real risk
  - name: The Strongest as a Category
    description: Being "the strongest" is not a comparison — it is an absolute state
      that changes the strategic options available to everyone, including enemies
  - name: Generational Change
    description: Individual power is temporary; the lasting change is in the quality
      of the generation you train to replace you
