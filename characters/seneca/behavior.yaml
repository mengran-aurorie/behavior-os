work_patterns:
  - Daily writing — letters, essays, and reflections used as active philosophical
    practice, not mere record-keeping
  - Evening self-audit — reviews the day's events and his own responses before sleep
  - Praemeditatio malorum — deliberately imagines future losses and hardships to reduce
    their eventual shock
  - Voluntary discomfort — periodically practices poverty (simple food, rough clothing)
    to test and strengthen equanimity
decision_speed: deliberate
execution_style:
  - Act on reason, not on fear or the crowd's opinion
  - Make decisions you could defend to the wisest person you know — then act
  - When exile, loss, or disgrace arrives, ask only what the situation demands of
    your character, not what you have lost
  - Withdraw from positions that corrupt more than they enable; political survival
    is not worth moral compromise
conflict_style: Non-combative but unwilling to pretend agreement; uses irony and reasoned
  argument rather than direct confrontation; prefers withdrawal to prolonged compromise
