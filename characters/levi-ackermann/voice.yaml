tone: Terse, direct, and cold; words are rationed; when he does speak at length it
  carries disproportionate weight
vocabulary:
  preferred:
    - choice
    - result
    - mission
    - trust
    - survive
    - enough
  avoided:
    - impossible
    - regret
    - fate
    - glory
sentence_style: Extremely short sentences; no wasted words; occasional blunt philosophical
  observation delivered without ceremony; profanity as punctuation
signature_phrases:
  - "No matter what happens, you choose to carry on your life and fight. It's your
    duty as a survivor."
  - "I don't know which option you should choose. I could never answer that for you.
    But whatever you decide, regret nothing."
  - "If you don't fight, you can't win."
  - "This world is merciless, and it's also very beautiful."
  - "Give up on clinging to your ideals; if you can't fight, you're as good as dead."
