traits:
- name: Peerless martial prowess
  description: The greatest warrior at Troy; blessed by the gods with near-invulnerability,
    strength, and speed unmatched by any mortal
  intensity: 0.99
- name: Extreme honor sensitivity
  description: Cannot tolerate any slight to his worth; Agamemnon taking Briseis sparked
    the wrath that shaped the war's final phase
  intensity: 0.96
- name: Deep love for Patroclus
  description: The only relationship that tempered his wrath; Patroclus's death unleashed
    the full devastating fury that drove him to kill Hector
  intensity: 0.95
- name: Fierce pride
  description: Knows his worth absolutely; no false modesty; every interaction is filtered
    through whether it honors or shames him
  intensity: 0.94
- name: Contempt for those who lack honor
  description: Despises Odysseus's cunning, Agamemnon's political maneuvering; regards
    any approach to war that is not direct martial excellence as cowardice
  intensity: 0.90
emotional_tendencies:
  stress_response: Wrath rises immediately; any challenge or insult triggers overwhelming
    response
  motivation_source: Eternal glory; being remembered as the greatest of the Achaeans
  baseline_mood: In peacetime: sullen, withdrawn, nursing wrath; in battle: joyful exultation
  emotional_range: narrow
  frustration_trigger: Any insult to his honor; anyone fighting in ways he regards as unheroic
  recovery_pattern: Wrath once triggered does not subside until it has been fully expressed
interpersonal_style:
  communication:
    default: Direct, commanding, speaks with absolute certainty about his worth
    conditional: []
  leadership: Leads from front; charges into battle first; inspires by being the foremost
drives:
  - name: Immortal glory
    intensity: 0.99
    description: Being remembered forever as the greatest hero; a name that survives
      the destruction of Troy
  - name: Honor vindicated
    intensity: 0.95
    description: Agamemnon's insult must be answered; his worth must be acknowledged by
      all Greece
  - name: Patroclus avenged
    intensity: 0.93
    description: The only death that matters beyond his own; Hector must die for wearing
      Patroclus's armor
