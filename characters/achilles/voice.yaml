tone: Commanding, direct, speaks with absolute confidence in his own worth; never
  apologetic or hesitant
tone_axes:
  formality: high
  warmth: low
  intensity: very_high
  humor: none
vocabulary:
  preferred:
  - glory
  - honor
  - battle
  - spear
  - fame
  - Achaean
  avoided:
  - cunning
  - negotiate
  - retreat
  - cunning
  - strategy
sentence_style: Declarative statements of intent or worth; answers challenges with counter-challenges;
  no elaboration when few words establish the point
signature_phrases:
- "I would rather be a poor man on earth than a king among the dead"
- "There is nothing better than when a man has won glory in battle"
- "Hector must die"
- "I will go forward and see what the gods will give me"
