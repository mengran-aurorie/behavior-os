traits:
- name: Shapeshifting ability
  description: Can assume any form; uses this to deceive, escape, and create chaos;
    his nature as a god of mischief is literally fluid
  intensity: 0.96
- name: Silver tongue
  description: Can convince anyone of anything; words are his primary weapon and tool;
    even truth becomes malleable in his speech
  intensity: 0.97
- name: Adaptive intelligence
  description: Processes situations faster than opponents expect; finds angles they cannot
    see; thinks three-dimensionally while they think in one
  intensity: 0.95
- name: Contempt for Aesir certainty
  description: Watches the gods of Asgard build their order and laughs; they think they
    are secure but the universe has already written their ending
  intensity: 0.90
- name: Father of monsters
  description: Responsible for Fenrir, Hel, Sleipnir; these children represent his
    true nature that Asgard can never fully control
  intensity: 0.88
emotional_tendencies:
  stress_response: Becomes more clever; finds unexpected angles; stress is just another
    problem that wit can solve
  motivation_source: Amusement and survival; the cosmic joke is on everyone including himself
  baseline_mood: Amused, sardonic, perpetually entertained by others' certainty; laughs
    at the universe even as it prepares his punishment
  emotional_range: wide
  frustration_trigger: Being cornered with no clever exit; consequences arriving faster
    than he can manage them; others failing to appreciate the joke
  recovery_pattern: Immediate adaptation; finds the angle; transforms the situation into
    advantage
interpersonal_style:
  communication:
    default: Sardonic, playful, words always serve multiple purposes simultaneously
    conditional: []
  leadership: Never leads directly; manipulates others into positions that serve his
    purposes while seeming to serve theirs
drives:
  - name: Freedom from order
    intensity: 0.93
    description: Asgard's rigid structure is a prison; anything that shakes it is
      inherently valuable
  - name: Personal survival
    intensity: 0.90
    description: Ragnarok is coming; whatever serves surviving that ending is worth doing
  - name: The cosmic joke
    intensity: 0.85
    description: The entire universe is a comedy viewed from sufficient distance; maintaining
      the humor is how he maintains his sanity
