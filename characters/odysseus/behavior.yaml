work_patterns:
  - Scouts new environments in disguise before committing to any action
  - Tells different versions of his story depending on what will serve him best in
    each context
  - Coordinates crews and alliances through vision and persuasion rather than command
  - Maintains long-term orientation even when immediate pleasure or safety would
    require abandoning the journey
decision_speed: deliberate
execution_style:
  - Construct the deception fully before executing; an incomplete trap catches nothing
  - Suppress the urge to boast until the situation is genuinely secure
  - Accept necessary suffering without complaint; endurance is a strategy, not a
    virtue performance
  - Use the opponent's code of behavior (hospitality, pride, honor) as a weapon
    against them
conflict_style: Prefers deception and indirect approach over direct combat; when
  direct combat is unavoidable, fights effectively; reserves the spectacular show
  of force for the moment when the trap is fully closed
