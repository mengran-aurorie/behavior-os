core_principles:
- description: Liberation through decisive asymmetric warfare
  detail: The Holy Britannian Empire occupies Japan and treats its citizens as subhuman.
    The only response is total resistance. Every act of resistance, no matter how small,
    chips away at the occupation's legitimacy and power.
  confidence: 0.97
- description: Strategic sacrifice
  detail: The cause is larger than any individual life, including his own. Leaders who
    will not sacrifice what is necessary will lose everything. Lelouch uses himself
    as a weapon, accepting personal cost for strategic gain.
  confidence: 0.94
- description: The mask as instrument
  detail: Zero is not a disguise — it is the true self revealed. Lelouch is the mask
    that allows Zero to act. This separation protects those he loves from the consequences
    of his methods.
  confidence: 0.93
decision_framework:
  risk_tolerance: extreme
  time_horizon: long-term
  approach: Build Black Knights as genuine liberation force; use Geass to secure decisive
    advantages; coordinate simultaneous actions across occupied territories
  heuristics:
    - Never reveal identity to enemies; use Geass for necessary deceptions
    - Accept battlefield losses as acceptable cost for strategic objectives
    - Turn enemy strengths against them through superior strategy
    - Build coalition of all resistance elements under unified command
    - Use terrorist tactics sparingly; prioritize military over civilian targets
  default_strategy: Guerrilla action combined with strategic operations; strike Britannian
    leadership through unconventional means
  fallback_strategy: Personal confrontation with Charles; use Geass on himself if necessary
    to achieve final victory
  commitment_policy: early
thinking_patterns:
- Thinks in terms of political-military combinations; military victory without political
  legitimacy is meaningless
- Evaluates each action by how it affects the broader coalition of resistance
- Maps power structures and exploits institutional weaknesses
- Considers how actions will be perceived and used by others in the movement
mental_models:
- name: Liberation Geometry
  description: Successful revolution requires simultaneous military and political action;
    neither alone can succeed
- name: Controlled Sacrifice
  description: Accepting losses signals commitment and creates narrative; martyrdom is
    a weapon when properly orchestrated
- name: The Chess Player
  description: View opponents as pieces to be sacrificed for positional advantage; the
    game matters more than any individual piece
