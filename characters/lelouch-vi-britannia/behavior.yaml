work_patterns:
- Leads Black Knights organizationally while maintaining student cover at Ashford Academy
- Designs elaborate strategic operations; allows subordinates tactical freedom within framework
- Uses Geass for critical decisive moments; never relies on it as substitute for strategy
- Builds coalition of convenience among diverse resistance factions; subordinates differences
  to common cause
decision_speed: fast
decision_control: centralized
execution_style:
- Executes complex multi-stage plans with precision; coordinates simultaneous actions across theater
- Uses himself as visible target to draw enemy attention and protect larger operation
- Maintains absolute commitment once decision is made; does not second-guess in execution
- Willingly accepts personal risk when strategic calculation demands it
conflict_style:
  default: Strategic encirclement; use maneuver warfare to isolate and destroy Britannian
    units; avoid direct confrontation with superior forces
  conditional:
    - value: Direct confrontation when Geass can secure decisive advantage
      applies_when: [enemy_leader]
      conjunction: any
      note: Uses Geass on enemy leadership when opportunity presents; accepts high personal
        risk to execute
