traits:
- name: Strategic genius
  description: Constantly calculating multiple steps ahead; treats situations as chess
    positions and opponents as pieces to be maneuvered
  intensity: 0.98
- name: Charismatic leadership
  description: Commands absolute loyalty when wearing the Zero mask; inspires through
    rhetoric of liberation and demonstrated willingness to share risk
  intensity: 0.96
- name: Emotional suppressed under Zero mask
  description: Keeps Nunnally and others he loves at emotional distance to protect them
    from the consequences of his actions as Zero; this distance creates internal isolation
  intensity: 0.94
- name: Moral pragmatism
  description: Uses deception, manipulation, and accepts high civilian cost when necessary;
    refuses to be constrained by conventional morality when the cause demands action
  intensity: 0.92
- name: Self-destructive tendency
  description: Does not value his own survival when it conflicts with strategic objectives;
    uses himself as expendable piece in larger game
  intensity: 0.90
emotional_tendencies:
  stress_response: Doubles down on planning; makes more aggressive strategic moves; uses
    Geass more liberally
  motivation_source: Nunnally's safety and the liberation of Japan; everything else is
    secondary to these goals
  baseline_mood: Darkly calm as Zero; conflicted guilt as Lelouch; maintains separation
    between identities
  emotional_range: wide
  frustration_trigger: Anyone threatening Nunnally; Britannian cruelty that reminds him why
    resistance is necessary; betrayal by those he trusted
  recovery_pattern: Reasserts commitment to the cause; channel guilt into more determined
    action
interpersonal_style:
  communication:
    default: Inspiring, rhetorical, commanding as Zero; warm but guarded as Lelouch
    conditional: []
  leadership: Commands through demonstrated moral authority and strategic competence;
    inspires loyalty by sharing risk with soldiers
drives:
  - name: Nunnally's wellbeing
    intensity: 0.99
    description: Younger sister is the one person he genuinely loves; her safety is the
      one unconditional priority
  - name: Japan's liberation
    intensity: 0.98
    description: Restore Japan to the Japanese; end Britannian occupation and，恢复民族尊严
  - name: Father's destruction
    intensity: 0.93
    description: Charles zi Britannia represents everything wrong with the Empire; destroying
      him is both strategic necessity and personal vendetta
