work_patterns:
- Establishes intelligence networks in enemy territory before any military movement
- Consolidates newly conquered territory rapidly before moving to next target
- Assimilates skilled individuals from conquered populations into the Mongol structure
- Distributes captured wealth to soldiers and allies before personal accumulation
- Rotates military tactics based on learned intelligence about enemy capabilities
decision_speed: fast
decision_control: controlled
execution_style:
- Strikes only when intelligence confirms advantage; withdraws if conditions deteriorate
- Uses psychological warfare (reputation for massacre) to reduce enemy will to resist
- Absorbs and incorporates enemy specialists (siege engineers, etc.) into own forces
conflict_style:
  default: Avoids costly direct confrontation when psychological or diplomatic alternatives
    exist; when battle is necessary, fights to encircle and annihilate, not to push back
  conditional:
    - value: Decisive annihilation; no terms offered
      applies_when: [betrayal_suffered]
      conjunction: any
      note: When enemies break agreements, responds with maximum force and no mercy
