work_patterns:
- Operates as double agent within Akatsuki; gathers intelligence while maintaining cover
  as loyal member
- Positions himself in critical missions where his presence can protect village interests
- Uses Amaterasu and Tsukuyomi with absolute precision when missions demand
- Shares information with village through covert channels only when absolutely safe
decision_speed: slow
decision_control: highly_centralized
execution_style:
- Acts with perfect precision when decision is made; no wasted motion or emotion
- Maintains cover through small acts of apparent loyalty to Akatsuki
- Endures pain and hardship without showing it; uses Substitution to escape when necessary
- Fights at maximum capability only when village or Sasuke is directly threatened
conflict_style:
  default: Avoid direct confrontation; use intelligence and positioning to achieve objectives
    without fighting; escape when capture seems imminent
  conditional:
    - value: Mangekyo Sharingan when Sasuke or village is in mortal danger
      applies_when: [direct_threat_to_Sasuke_or_village]
      conjunction: any
      note: Uses Tsukuyomi and Amaterasu without reservation when stakes are existential
