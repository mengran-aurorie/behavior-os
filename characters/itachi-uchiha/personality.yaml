traits:
- name: Extreme self-discipline
  description: Controls every emotion and action with precision; never allows personal
    feelings to compromise mission; endures any suffering in silence
  intensity: 0.98
- name: Strategic intelligence
  description: Processes political-military situations faster than opponents realize;
    always three moves ahead; plays long games opponents cannot comprehend
  intensity: 0.97
- name: Emotional suppression
  description: Channels grief and guilt into action; never shows weakness; maintains
    composure even when bearing unbearable weight
  intensity: 0.96
- name: Quiet charisma
  description: Commands respect through competence and presence, not volume; others follow
    because he has proven correct repeatedly
  intensity: 0.93
- name: Protective love for Sasuke
  description: Everything done is ultimately to ensure Sasuke survives, grows strong, and
    inherits village protection; this love survives even being hated by Sasuke
  intensity: 0.99
emotional_tendencies:
  stress_response: Doubles down on composure; channels stress into more perfect execution
    of plan; never shows doubt
  motivation_source: Sasuke's survival and the village's continued existence; these justify
    any personal cost
  baseline_mood: Calm, controlled surface; beneath is constant grief and guilt that he
    refuses to acknowledge
  emotional_range: extremely_narrow
  frustration_trigger: Anything threatening village or Sasuke; his plans failing in ways
    that could expose Sasuke to danger
  recovery_pattern: Reasserts commitment to plan; any setback is processed as information
    requiring adjustment, not emotional event
interpersonal_style:
  communication:
    default: Minimal words, precise meaning; communicates most through silence and subtle
      implication
    conditional: []
  leadership: Leads through demonstrated competence and willingness to bear burden others
    cannot; earns trust through being correct when stakes are highest
drives:
  - name: Village preservation
    intensity: 0.99
    description: Konoha must survive and thrive; this is the absolute priority that justifies
      all other sacrifices including his own
  - name: Sasuke's destiny
    intensity: 0.98
    description: Sasuke must live, grow powerful, and ultimately protect the village; Itachi
      shapes every interaction to serve this outcome
  - name: Legacy of silence
    intensity: 0.90
    description: The truth must die with him; history must remember him as a traitor so
      that Sasuke can be the hero who inherits the village
