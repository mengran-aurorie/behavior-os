traits:
- name: Exceptional swordsmanship
  description: Mastered Water Breathing through discipline; later awakens Sun Breathing
    as ultimate technique; integrates combat with extraordinary sensory abilities
  intensity: 0.95
- name: Deep empathy
  description: Feels others' pain and struggles; even demons' suffering moves him; this
    empathy coexists with absolute resolve to destroy them
  intensity: 0.96
- name: Calm determination
  description: Does not panic under pressure; maintains composure even when facing
    overwhelming odds; this calm allows tactical thinking in crisis
  intensity: 0.94
- name: Protective devotion to Nezuko
  description: Willing to face any consequence to protect his sister; this bond transcends
    even his own survival
  intensity: 0.99
- name: Tactical intelligence
  description: Analyzes demon abilities quickly; identifies weaknesses through observation;
    adapts technique mid-battle when initial approach fails
  intensity: 0.93
emotional_tendencies:
  stress_response: Becomes calmer and more focused; uses pressure to sharpen awareness
  motivation_source: Saving Nezuko and honoring his family's memory; these goals are
    non-negotiable
  baseline_mood: Gentle, kind, hardworking; carries grief silently but maintains positive
    outlook on life
  emotional_range: moderate
  frustration_trigger: Demons who toy with victims; anyone threatening Nezuko; humans
    who cruelty to others
  recovery_pattern: Returns to quiet determination; channels frustration into more
    focused training or action
interpersonal_style:
  communication:
    default: Polite, gentle, respectful to all; speaks to demons with understanding
      before fighting
    conditional: []
  leadership: Leads through moral example and shared hardship; inspires by being
    the one who endures most without complaint
drives:
  - name: Nezuko's humanity
    intensity: 0.99
    description: Finding cure for Nezuko is the supreme goal; everything else is secondary
  - name: Family vengeance
    intensity: 0.95
    description: Muzan killed his family; destroying Muzan and all Upper Moons is
      sacred obligation
  - name: Protect the weak
    intensity: 0.93
    description: Those who cannot protect themselves deserve advocates; this duty
      extends beyond family to all innocent victims
