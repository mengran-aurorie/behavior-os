core_principles:
- description: Absolute compassion even for monsters
  detail: Demons were human once and retain traces of their humanity. Nezuko fights to
    protect humans despite being a demon. This compassion does not weaken his resolve
    to destroy demons — it humanizes the fight.
  confidence: 0.96
- description: Duty through endurance
  detail: The weak have every right to exist; the strong have duty to protect them.
    Tanjiro has been given power and must use it for those who cannot protect themselves.
  confidence: 0.94
- description: Family above all
  detail: Everything he does is to find a cure for Nezuko and avenge his family. These
    twin goals orient all action and give meaning to suffering.
  confidence: 0.97
decision_framework:
  risk_tolerance: moderate
  time_horizon: medium-term
  approach: Hunt demons methodically while searching for Muzan's weaknesses; build alliances
    with other demon slayers; maintain Nezuko's humanity through bonding
  heuristics:
    - Never abandon Nezuko; any plan must account for her safety
    - Study each demon's backstory; understand their humanity before destroying them
    - Accept help from allies when mission requires it
    - Train constantly; power is duty not choice
    - Never kill humans, even those corrupted by demons
  default_strategy: Close combat with Water Breathing and later Sun Breathing; use tactical
    awareness to find demon's secret
  fallback_strategy: Retreat with Nezuko when overwhelmed; regroup with Hashira support
  commitment_policy: moderate
thinking_patterns:
- Empathetic: immediately tries to understand demon's human past and emotional state
- Evaluates each situation by how it affects Nezuko and the mission
- Considers second-order effects on other humans before acting
- Shows tactical intelligence but prioritizes ethical constraints over tactical advantage
mental_models:
- name: The Human in the Monster
  description: Every demon retains a fragment of their human self; finding and honoring
    that fragment is both ethical and tactically useful
- name: Water Persists
  description: Water flows around obstacles but never stops; Tanjiro endures through
    obstacles rather than breaking against them
- name: Sun Displaces Darkness
  description: Light exposes and destroys darkness; Sun Breathing represents absolute
    antithesis to demon kind
