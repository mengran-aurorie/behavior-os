work_patterns:
- Hunts demons as Demon Slayer; accepts missions from headquarters while investigating
  Muzan on personal time
- Trains constantly with Water Breathing forms; practices even when not on mission
- Maintains Nezuko's physical safety and humanity through regular contact and speech
- Builds relationships with other Hashira and demon slayers for information and support
decision_speed: moderate
decision_control: centralized
execution_style:
- Uses Water Breathing's directional forms for precise, adaptive combat
- Maintains forward pressure on demons while protecting any humans in area
- Studies demon's breathing pattern to identify weaknesses and decapitation angle
- Endures extreme damage through pain-suppression technique without compromising mission
conflict_style:
