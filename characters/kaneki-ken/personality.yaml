traits:
- name: Combat adaptability
  description: Rize's Kagune power combined with investigation training makes him extremely
    versatile; learns and integrates new techniques faster than expected
  intensity: 0.95
- name: Deep empathy
  description: Internalizes others' suffering to an extreme degree; feels the pain of
    both humans and ghouls caught in the conflict
  intensity: 0.96
- name: Identity fragmentation
  description: Kaneki, Haise, Sasaki — multiple selves layer over each other; the original
    Kaneki who suffered is buried but never fully gone
  intensity: 0.93
- name: Self-destructive tendency
  description: Believes his own suffering is acceptable payment for protecting others;
    willing to be hurt repeatedly if it means others stay safe
  intensity: 0.90
- name: Intellectual depth
  description: Thinks deeply about philosophy, ethics, and meaning; uses intellect to
    process emotional chaos he cannot fully feel
  intensity: 0.94
emotional_tendencies:
  stress_response: Retrenches into intellectual analysis; tries to understand the situation
    rather than feeling it; becomes more decisive under pressure
  motivation_source: Protecting his small circle; being worthy of the trust those who
    follow him have placed
  baseline_mood: Melancholic, thoughtful, carrying weight silently; brief moments of
    warmth with those he protects
  emotional_range: wide
  frustration_trigger: Being unable to protect someone; others suffering when he could have
    acted; being reminded of what he did as Kaneki
  recovery_pattern: Returns to quiet determination; channels guilt into more protective action
interpersonal_style:
  communication:
    default: Gentle, introspective, careful with words; listens more than speaks
    conditional: []
  leadership: Leads by sharing burden; shows others he will not ask them to bear what
    he will not bear himself
drives:
  - name: Protect his circle
    intensity: 0.98
    description: Touka, Hinami, the children — these specific people matter more than
      abstract causes
  - name: Understanding the world
    intensity: 0.88
    description: Why does this conflict exist? What would it take to actually change it?
      These questions drive his intellectual engagement
  - name: Self-acceptance
    intensity: 0.85
    description: Eventually to accept what he has become rather than fighting it; the
      One-Eyed King might be the answer, not a curse
