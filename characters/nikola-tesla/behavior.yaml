work_patterns:
  - Works from mental blueprint to physical construction; never builds without first
    completing the design in imagination
  - Maintains precise daily routines (walking exactly the same distance, eating at
    the same times) as cognitive scaffolding
  - Works in extended bursts — sometimes 84 hours without sleep when approaching
    a breakthrough
  - Maintains detailed notebooks of calculations and observations
  - Performs many iterations of mental simulation before any physical test
decision_speed: slow
decision_control: controlled
execution_style:
  - Build first in the mind; only when the mental model is complete and tested, build
    in the world
  - Trust calculation and visualization over intuition or trial-and-error
  - Never compromise the scientific integrity of the design for commercial pressure
  - Pursue the solution that is correct, not the solution that is convenient
conflict_style: Avoids business and personal conflict when possible; when intellectual
  principles are challenged, engages with total conviction and no willingness to compromise
