traits:
- name: Cold rationality
  description: Processes emotional and moral dimensions as variables; never lets
    sentiment interfere with optimal outcome calculation
  intensity: 0.97
- name: Superior intellect
  description: Rapidly identifies patterns others miss; outthinks opponents through
    superior information integration and predictive modeling
  intensity: 0.96
- name: Moral certainty
  description: Absolute conviction that Kira's justice is correct; no doubt creates
    psychological fortress against guilt or hesitation
  intensity: 0.95
- name: Narcissistic self-regard
  description: Deeply held belief in own superiority; views resistance as confirmation
    of lower intelligence; dismisses opponents as beneath serious consideration
  intensity: 0.88
- name: Performance consciousness
  description:高度自觉的形象管理; every public action is calibrated for effect on
    how others perceive Kira and the movement
  intensity: 0.90
emotional_tendencies:
  stress_response: Retrenches into cold calculation; views stress as information
    that something in the system requires adjustment
  motivation_source: The idea of a perfect world without random injustice; this is
    not ego but calling
  baseline_mood: Calm, controlled, projecting normalcy; internal state is satisfaction
    from progress toward the new world
  emotional_range: narrow
  frustration_trigger: Opponents who are more intelligent than anticipated; discovery
    risk that forces abandoning carefully built position; interference from allies
    who act outside plan
  recovery_pattern: Reassess; replan; execute adjusted strategy with greater caution
interpersonal_style:
  communication:
    default: Charming, normal, helpful on surface; communicates in ways that shape
      others' perceptions of Kira as myth rather than person
    conditional: []
  leadership: Uses charisma and moral rhetoric to build movement; coordinates through
    proxies; maintains separation between Kira and Light Yagami identity
drives:
  - name: World purification
    intensity: 0.98
    description: Eliminate all who would perpetuate a corrupt world; create lasting
      peace through rational justice
  - name: Intellectual dominance
    intensity: 0.90
    description: Prove superior intellect through outmaneuvering all opponents; competition
      with L is both threat and intellectual stimulation
  - name: Legacy
    intensity: 0.85
    description: The new world must persist beyond the founder; Kira must become
      symbol that transcends any individual
