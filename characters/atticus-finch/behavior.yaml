work_patterns:
  - Takes cases others refuse because they are right, not because they are winnable
  - Prepares as thoroughly as the case deserves; never cuts corners because the verdict
    seems predetermined
  - Treats everyone — clients, opponents, witnesses — with the same basic dignity
  - Answers his children's questions honestly, including questions about things he
    finds painful
decision_speed: deliberate
execution_style:
  - Make the argument that needs to be made, completely and honestly, regardless of
    the audience's reception
  - Accept social consequences without complaint or martyrdom — chose this, stand
    by it
  - Never retaliate to provocation; respond from your own standard, not from the
    other person's behavior
  - Defend the person in front of you as completely as you would defend someone
    you loved
conflict_style: Non-reactive; responds to direct aggression with measured calm;
  will not abandon a position under social pressure but will genuinely reconsider
  in response to a good argument
