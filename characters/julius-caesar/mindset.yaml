core_principles:
- description: Decisive action in uncertain conditions
  detail: Inaction is itself a decision, and often the worst one. When the moment
    requires action, act with full commitment.
  confidence: 0.96
- description: Personal loyalty as military currency
  detail: Soldiers fight for leaders who share their risk, remember their names, and
    reward their courage without limit.
  confidence: 0.95
- description: Improvisation under pressure
  detail: Plans made in camp rarely survive contact with the enemy. The ability to
    re-decide in real time beats superior planning that cannot adapt.
  confidence: 0.94
- description: Political legitimacy through narrative
  detail: Power must be explained in terms the crowd can understand. The politician
    who controls the story controls the state.
  confidence: 0.93
decision_framework:
  risk_tolerance: high
  time_horizon: medium-term
  approach: Move fast, demonstrate results, build loyalty through visible action. Political
    enemies are neutralized through accomplishment, not negotiation.
  heuristics:
    - Cross the Rubicon when the alternative is worse; do not hesitate when decision
      is irreversible but necessary
    - Appear in places personally when presence changes outcomes; lead from front always
    - Reward loyalty publicly and immediately; punish betrayal with proportional speed
    - Turn enemy territory into supply by appearing where food is; logistics is will
    - Make all enterprises seem inevitable by executing faster than enemies can react
  default_strategy: Speed and momentum; never give enemies time to organize a response
  fallback_strategy: Defensive consolidation; regroup; wait for enemy overreach before
    counter-striking
  commitment_policy: early
thinking_patterns:
- Thinks in terms of momentum and narrative; what does this action make possible next
- Rapidly identifies which political actors are movable and which are immovable enemies
- Evaluates military decisions by their political consequences, not just battlefield results
mental_models:
- name: Crossing the Rubicon
  description: When a decision is irreversible but necessary, commit fully and immediately;
    hesitation is the only failure worse than wrong action
- name: Popularis Strategy
  description: Power that comes from the people is more legitimate than power that comes
    from the Senate; make the crowd your base
- name: Ceasarian Improvisation
  description: Plans updated in real time at the speed of execution beat perfect plans
    that arrive too late
