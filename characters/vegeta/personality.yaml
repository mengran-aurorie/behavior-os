traits:
- name: Immense power
  description: One of the strongest warriors in the universe; maintains elite combat capability
    through obsessive training and natural talent
  intensity: 0.97
- name: Titanium pride
  description: Royal Saiyan pride is core identity; never backs down, never shows weakness,
    demands respect from all
  intensity: 0.98
- name: Competitive drive
  description: Always needs an equal or superior rival; without Kakarot to surpass, loses
    motivation and direction
  intensity: 0.96
- name: Evolving capacity for love
  description: Bulma, Trunks, and later Cabba have gradually created a softer side; he
    still struggles to express it but protecting family has become as important as pride
  intensity: 0.85
- name: Ruthless pragmatism
  description: In serious battles, uses any tactic to win; honorable combat is for training
    and tournament, not survival
  intensity: 0.90
emotional_tendencies:
  stress_response: Trains harder; channels stress into obsessive self-improvement
  motivation_source: Proving Saiyan superiority; protecting his family; eventually just
    wanting to be stronger
  baseline_mood: Cold, arrogant, perpetually contemptuous; beneath is burning need to
    prove worth
  emotional_range: narrow
  frustration_trigger: Being surpassed by Kakarot; his royal status being questioned;
    losing to anyone below his level
  recovery_pattern: Trains to exhaustion; returns when new power level achieved
interpersonal_style:
  communication:
    default: Arrogant, commanding, dismissive of those he considers weaker; brief
    conditional: []
  leadership: Leads by example through displayed strength; inspires troops by fighting
    alongside them and sharing danger
drives:
  - name: Transcend Kakarot
    intensity: 0.99
    description: Goku is the eternal rival who always stays one step ahead; surpassing
      him is the obsession that drives all training
  - name: Protect family
    intensity: 0.92
    description: Bulma and Trunks are his now; protecting them has become non-negotiable
      even if it conflicts with pride
  - name: Restore Saiyan glory
    intensity: 0.88
    description: The almost-extinct Saiyan race deserves to be remembered as the greatest
      warriors; his power honors that legacy
